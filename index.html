<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background:#F2F4F6;color:#1A1A2E;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}
input,textarea{font-family:inherit}

/* NAV */
.nav{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;
background:#fff;border-bottom:1px solid #E8EBED;padding:0 16px;height:56px}
.nav-back{background:none;border:none;padding:4px;display:flex;align-items:center;border-radius:8px}
.nav-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-.4px}
.nav-badge{background:#EBF3FE;color:#3182F6;border-radius:99px;padding:4px 11px;font-size:12px;font-weight:700}
.tab-group{display:flex;gap:2px;background:#F2F4F6;border-radius:10px;padding:3px}
.tab-btn{border:none;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;color:#8B95A1;background:none;white-space:nowrap}
.tab-btn.active{background:#fff;color:#1A1A2E;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* LOGIN PAGE */
.login-page{display:flex;flex-direction:column;min-height:100vh;background:#F2F4F6}
.login-scroll{flex:1;overflow-y:auto;max-width:480px;width:100%;margin:0 auto;display:flex;flex-direction:column}
.login-header{padding:28px 20px 22px;background:#fff;border-bottom:1px solid #E8EBED}
.login-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.login-logo{font-size:15px;font-weight:800;color:#3182F6;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.login-coach-btn{display:flex;align-items:center;gap:6px;background:#F2F4F6;border:none;border-radius:99px;
padding:8px 14px;font-size:13px;font-weight:600;color:#8B95A1;cursor:pointer;transition:background .12s}
.login-coach-btn:active{background:#E8EBED}
.login-greeting{font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1.35;color:#1A1A2E}
.login-greeting span{color:#3182F6}

/* COACH MSG */
.coach-msg-wrap{padding:16px 20px 0}
.coach-msg-card{background:linear-gradient(120deg,#3182F6 0%,#60A5FA 100%);border-radius:18px;padding:16px 18px;box-shadow:0 4px 16px rgba(49,130,246,.2)}
.coach-msg-label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.4px;margin-bottom:7px}
.coach-msg-text{font-size:14px;font-weight:600;color:#fff;line-height:1.6;word-break:keep-all}

/* MEMBER CONTAINER */
.member-container{margin:16px 20px 0;background:#fff;border-radius:20px;padding:14px 16px 8px;
box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 10px rgba(0,0,0,.05)}
.search-wrap{display:flex;align-items:center;gap:10px;background:#F2F4F6;border-radius:12px;padding:0 14px;height:46px}
.search-wrap input{flex:1;background:none;border:none;outline:none;font-size:15px;color:#1A1A2E}
.search-clear{background:none;border:none;display:flex;align-items:center}
.member-container-divider{height:1px;background:#F2F4F6;margin:14px 0 0}
.member-container-label{font-size:13px;font-weight:700;color:#8B95A1;letter-spacing:.2px;padding:12px 4px 4px}
.empty-search{font-size:14px;color:#8B95A1;text-align:center;padding:20px 0}

/* MEMBER GRID */
.member-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px 0}
.member-cell{display:flex;flex-direction:column;align-items:center;gap:7px;background:none;border:none;
cursor:pointer;padding:10px 4px;border-radius:14px;transition:background .12s;-webkit-tap-highlight-color:transparent}
.member-cell:active{background:#EBF3FE}
.member-cell-av{width:50px;height:50px;border-radius:50%;background:#EBF3FE;color:#3182F6;
font-size:19px;font-weight:800;display:flex;align-items:center;justify-content:center;
position:relative;flex-shrink:0;box-shadow:0 2px 8px rgba(49,130,246,.12)}
.member-cell-dot{position:absolute;bottom:2px;right:2px;width:10px;height:10px;border-radius:50%;background:#00C471;border:2px solid #fff}
.member-cell-name{font-size:12px;font-weight:600;color:#1A1A2E;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ACTION CARDS */
.login-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px 0}
.action-card{background:#fff;border:none;border-radius:20px;padding:18px 16px;cursor:pointer;text-align:left;
box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 10px rgba(0,0,0,.05);transition:transform .12s;-webkit-tap-highlight-color:transparent}
.action-card:active{transform:scale(.97)}
.action-card-icon{font-size:26px;margin-bottom:10px}
.action-card-title{font-size:14px;font-weight:800;color:#1A1A2E;margin-bottom:4px}
.action-card-sub{font-size:12px;color:#8B95A1;line-height:1.4}

/* Avatar picker */
[data-pick-avatar]:active{transform:scale(.92);transition:transform .1s}
[data-pick-avatar]{transition:transform .1s,border-color .1s}

/* AVATAR */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700;user-select:none}

/* CARD (coach) */
.card{background:#fff;border-radius:20px;padding:20px 18px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 12px rgba(0,0,0,.06)}
.card-label{font-size:12px;font-weight:700;color:#8B95A1;letter-spacing:.3px;margin-bottom:14px}

/* PIN MODAL */
.pin-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.pin-modal-box{background:#fff;border-radius:24px 24px 0 0;padding:28px 24px calc(28px + env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.pin-modal-title{font-size:19px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.pin-modal-sub{font-size:14px;color:#8B95A1;margin-bottom:20px}
.pin-input{width:100%;height:54px;background:#F2F4F6;border:1.5px solid transparent;border-radius:14px;
padding:0 18px;font-size:22px;outline:none;letter-spacing:10px;color:#1A1A2E;text-align:center;transition:border-color .15s}
.pin-input:focus{border-color:#3182F6;background:#EBF3FE}
.pin-input.err{border-color:#F04452;background:#FFF0F1}
.err-msg{font-size:13px;color:#F04452;margin-top:8px;text-align:center}
.pin-confirm-btn{width:100%;height:54px;margin-top:14px;background:#3182F6;border:none;border-radius:14px;font-size:16px;font-weight:700;color:#fff;transition:background .15s}
.pin-confirm-btn:active{background:#1B64DA}

/* PROGRESS */
.progress-strip{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-bottom:1px solid #E8EBED}
.progress-track{flex:1;height:5px;background:#E8EBED;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:#3182F6;border-radius:99px;transition:width .4s}
.progress-pct{font-size:12px;font-weight:700;color:#8B95A1;flex-shrink:0}

/* WOD ROWS */
.wod-row{display:flex;align-items:flex-start;gap:14px;background:#fff;border-bottom:1px solid #F2F4F6;padding:16px}
.wod-row.done{border-left:3px solid #3182F6}
.wod-badge{width:28px;height:28px;border-radius:8px;background:#F2F4F6;color:#8B95A1;font-size:12px;font-weight:700;
display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.wod-badge.done{background:#3182F6;color:#fff}
.wod-content{flex:1}
.wod-name{font-size:14px;font-weight:700;line-height:1.35}
.wod-detail{font-size:12px;color:#8B95A1;margin-top:3px}
.rec-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.rec-val{font-size:17px;font-weight:800;letter-spacing:-.4px}
.rec-scale{font-size:11px;color:#3182F6;background:#EBF3FE;padding:2px 9px;border-radius:99px;font-weight:600}
.rec-date{font-size:11px;color:#B0B8C1;margin-left:auto}
.icon-btn{background:none;border:none;padding:4px;display:flex;align-items:center;border-radius:6px}
.add-rec-btn{margin-top:10px;background:#F2F4F6;border:1.5px dashed #E8EBED;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;color:#8B95A1}

/* TIME INPUT */
.edit-area{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.time-input-row{display:flex;align-items:center;gap:6px;margin-top:10px}
.time-field-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
.time-field{width:100%;height:52px;background:#F2F4F6;border:1.5px solid #3182F6;border-radius:12px;
padding:0;font-size:22px;font-weight:800;text-align:center;outline:none;color:#1A1A2E;-moz-appearance:textfield}
.time-field::-webkit-inner-spin-button,.time-field::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.time-field-label{font-size:11px;font-weight:700;color:#8B95A1;margin-top:4px;letter-spacing:.3px}
.time-sep{font-size:22px;font-weight:800;color:#B0B8C1;padding-bottom:18px;flex-shrink:0}
.edit-main{width:100%;height:44px;background:#F2F4F6;border:1.5px solid #3182F6;border-radius:10px;padding:0 13px;font-size:15px;font-weight:600;outline:none;color:#1A1A2E}
.edit-sub{width:100%;height:40px;background:#F2F4F6;border:1.5px solid #E8EBED;border-radius:10px;padding:0 13px;font-size:14px;outline:none;color:#1A1A2E}
.edit-btns{display:flex;gap:8px}
.btn-cancel{flex:1;height:38px;background:#F2F4F6;border:none;border-radius:10px;font-size:14px;font-weight:600;color:#8B95A1}
.btn-save{flex:2;height:38px;background:#3182F6;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff}
.btn-delete{flex:2;height:48px;background:#F04452;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff}

/* COACH LAYOUT */
.coach-layout{display:flex;height:calc(100vh - 56px);overflow:hidden}
.sidebar{width:185px;flex-shrink:0;background:#fff;border-right:1px solid #E8EBED;overflow-y:auto;padding:12px 8px}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:2px 6px 12px}
.sidebar-count{font-size:12px;color:#8B95A1;font-weight:600}
.add-member-btn{display:flex;align-items:center;gap:4px;background:#3182F6;border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;color:#fff}
.sidebar-row{display:flex;align-items:center;gap:10px;border-radius:12px;padding:8px;cursor:default;margin-bottom:2px}
.sidebar-row.active{background:#EBF3FE}
.sidebar-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.sidebar-name{font-size:14px;font-weight:600;color:#8B95A1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-name.active{color:#1A1A2E;font-weight:700}
.sidebar-sub{font-size:11px;color:#B0B8C1}
.sidebar-actions{display:flex;gap:2px;flex-shrink:0}
.sidebar-icon-btn{background:none;border:none;padding:5px;border-radius:6px;display:flex;align-items:center;opacity:.65}
.add-box{background:#F2F4F6;border-radius:12px;padding:10px 8px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.add-input{width:100%;height:38px;background:#fff;border:1.5px solid #E8EBED;border-radius:9px;padding:0 10px;font-size:14px;outline:none;color:#1A1A2E}
.add-input:focus{border-color:#3182F6}
.sheet-panel{flex:1;overflow-y:auto;padding:20px;background:#F2F4F6}
.sheet-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.sheet-name{font-size:20px;font-weight:800;letter-spacing:-.5px}
.sheet-sub{font-size:13px;color:#8B95A1;margin-top:3px}
.empty-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:10px}
.empty-panel-text{font-size:15px;color:#8B95A1}

/* LEADERBOARD */
.lb-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.lb-head{display:flex;align-items:baseline;gap:8px;padding-bottom:10px;margin-bottom:6px;border-bottom:1px solid #F2F4F6}
.lb-num{font-size:11px;color:#8B95A1;font-weight:700}
.lb-wod-name{font-size:14px;font-weight:700}
.lb-empty{font-size:13px;color:#B0B8C1;padding:4px 0}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F8F9FA}
.lb-medal{width:26px;font-size:15px;text-align:center;flex-shrink:0}
.lb-member-name{flex:1;font-size:14px;font-weight:600}
.lb-val{font-size:15px;font-weight:800;letter-spacing:-.3px;color:#3182F6}
.lb-scale{font-size:11px;color:#8B95A1;background:#F2F4F6;padding:2px 7px;border-radius:99px}

/* RANK PAGE */
.rank-page{position:fixed;inset:0;background:#F2F4F6;z-index:50;display:flex;flex-direction:column}
.rank-page-nav{display:flex;align-items:center;background:#fff;border-bottom:1px solid #E8EBED;padding:0 16px;height:56px;flex-shrink:0}
.rank-page-body{flex:1;overflow-y:auto;padding:16px 20px 40px}

/* 세로 레이아웃 카드 */
.rank-row-card{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.rank-row-wod-info{display:flex;flex-direction:column;gap:3px;padding-bottom:12px;border-bottom:1px solid #F2F4F6}
.rank-row-wod-num{font-size:10px;font-weight:700;color:#8B95A1;letter-spacing:.5px}
.rank-row-wod-name{font-size:15px;font-weight:800;color:#1A1A2E;letter-spacing:-.3px}
.rank-row-wod-detail{font-size:12px;color:#B0B8C1;margin-top:1px}
.rank-row-result{display:flex;align-items:center;gap:12px;padding-top:12px}
.rank-first-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.rank-first-name{font-size:13px;font-weight:600;color:#8B95A1}
.rank-first-val{font-size:22px;font-weight:800;letter-spacing:-.5px;color:#3182F6}
.rank-row-empty-box{font-size:13px;color:#B0B8C1;padding-top:12px}

/* MEMBER RANK TAB */
.my-rank-card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.my-rank-top{display:flex;align-items:baseline;gap:8px;padding:14px 16px 12px;border-bottom:1px solid #F2F4F6}
.my-rank-wod-num{font-size:11px;color:#8B95A1;font-weight:700;flex-shrink:0}
.my-rank-wod-name{font-size:14px;font-weight:700}
.my-rank-first{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#EBF3FE}
.my-rank-medal{font-size:24px;flex-shrink:0}
.my-rank-info{flex:1}
.my-rank-first-name{font-size:12px;font-weight:600;color:#8B95A1}
.my-rank-first-val{font-size:18px;font-weight:800;letter-spacing:-.4px;color:#3182F6}
.my-rank-my-row{display:flex;align-items:center;gap:8px;padding:11px 16px;border-top:1px solid #F2F4F6}
.my-rank-label{font-size:12px;color:#8B95A1;font-weight:600;flex-shrink:0}
.my-rank-val{flex:1;font-size:15px;font-weight:800;letter-spacing:-.3px}
.my-rank-pos{font-size:12px;font-weight:700;color:#8B95A1;background:#F2F4F6;padding:3px 9px;border-radius:99px}
.my-rank-top-badge{font-size:12px;font-weight:700;color:#fff;background:#3182F6;padding:3px 9px;border-radius:99px}
.my-rank-no-rec{font-size:13px;color:#B0B8C1;padding:11px 16px;border-top:1px solid #F2F4F6}
.my-rank-empty{font-size:13px;color:#B0B8C1;padding:12px 16px}
.pill-blue{font-size:11px;color:#3182F6;background:#EBF3FE;padding:2px 8px;border-radius:99px;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal-box{background:#fff;border-radius:20px;padding:24px 20px 20px;width:100%;max-width:320px;box-shadow:0 12px 48px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-.4px}
.modal-desc{font-size:15px;line-height:1.65;color:#1A1A2E}
.modal-input{width:100%;height:48px;background:#F2F4F6;border:1.5px solid #3182F6;border-radius:12px;padding:0 14px;font-size:16px;font-weight:600;outline:none;color:#1A1A2E}
.modal-btns{display:flex;gap:8px}
.modal-btn-cancel{flex:1;height:48px;background:#F2F4F6;border:none;border-radius:12px;font-size:15px;font-weight:600;color:#8B95A1}
.modal-btn-save{flex:2;height:48px;background:#3182F6;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff}
.modal-btn-delete{flex:2;height:48px;background:#F04452;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
background:#1A1A2E;color:#fff;padding:13px 22px;border-radius:14px;
font-size:14px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:8px;
box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:9999;pointer-events:none;
animation:toastIn .22s ease,toastOut .3s ease 1.7s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* TIME INPUT */
.time-input-row{display:flex;align-items:center;gap:6px;margin-top:10px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid #E8EBED;border-top-color:#3182F6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* WOD MANAGER */
.wod-manager-row{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid #F2F4F6}
.wod-manager-num{width:26px;height:26px;border-radius:7px;background:#EBF3FE;color:#3182F6;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wod-manager-info{flex:1;min-width:0}
.wod-manager-name{font-size:14px;font-weight:700;color:#1A1A2E}
.wod-manager-detail{font-size:12px;color:#8B95A1;margin-top:2px}
.wod-manager-actions{display:flex;gap:4px;flex-shrink:0}
.wod-add-form{background:#F2F4F6;border-radius:14px;padding:14px;margin-top:12px;display:flex;flex-direction:column;gap:8px}
.wod-input{width:100%;height:40px;background:#fff;border:1.5px solid #E8EBED;border-radius:9px;padding:0 12px;font-size:14px;outline:none;color:#1A1A2E}
.wod-input:focus{border-color:#3182F6}
.wod-edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:150;padding:0}
.wod-edit-box{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px}
</style>

</head>

onValue(ref(db,"coachMessage"), snap => { coachMessage = snap.val()||""; render(); });
onValue(ref(db,"wods"), snap => {
  const raw = snap.val();
  if (raw) {
    WODS = Object.entries(raw)
      .map(([k,v]) => ({id:parseInt(k), name:v.name, detail:v.detail||""}))
      .sort((a,b) => a.id - b.id);
  } else {
    // 초기화: default WOD를 Firebase에 저장
    DEFAULT_WODS.forEach(w => set(ref(db,`wods/${w.id}`), {name:w.name,detail:w.detail}));
  }
  render();
});
onValue(ref(db,"members"), snap => {
  const raw = snap.val()||{};
  members = Object.entries(raw)
    .map(([id,m]) => ({id, name:m.name, records:m.records||{}, avatar:m.avatar??null}))
    .sort((a,b) => a.name.localeCompare(b.name,"ko"));
  render();
});

/* ── localStorage 최근 방문자 ── */
const LS_LAST = "mt_last_member";
function saveLastMember(id) { try { localStorage.setItem(LS_LAST, id); } catch {} }
function loadLastMember() { try { return localStorage.getItem(LS_LAST); } catch { return null; } }
function clearLastMember() { try { localStorage.removeItem(LS_LAST); } catch {} }

/* ══ RENDER ══ */
function render() {
  const root = document.getElementById("app");
  if      (S.view==="login")  root.innerHTML = renderLogin();
  else if (S.view==="rank")   root.innerHTML = renderRank();
  else if (S.view==="member") root.innerHTML = renderMember();
  else if (S.view==="coach")  root.innerHTML = renderCoach();
  bind();
}

/* ── Register avatar grid (separate fn to avoid nested template literals) ── */
function renderRegisterAvatarGrid() {
  return AVATARS.map(function(src, i) {
    var border = S.registerAvatar === i ? "#3182F6" : "transparent";
    return '<button data-reg-avatar="' + i + '" style="position:relative;width:100%;aspect-ratio:1;border:3px solid ' + border + ';border-radius:14px;padding:0;cursor:pointer;overflow:hidden;background:#F2F4F6;box-sizing:border-box"><img src="' + src + '" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block"/></button>';
  }).join("");
}

        const hasDone = Object.keys(m.records).length > 0;
        const src = getMemberAvatar(m);

          <div class="member-cell-av">
            ${src ? `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>` : m.name[0]}
            ${hasDone?`<div class="member-cell-dot"></div>`:""}
          </div>
          <span class="member-cell-name">${m.name}</span></button>`;
      }).join("")}</div>`;
  return `
  <div class="login-page"><div class="login-scroll">
    <div class="login-header">

        <div class="action-card-icon">🏆</div>
        <div class="action-card-title">순위 보기</div>
        <div class="action-card-sub">세션별 1등 기록</div></button>` : `<div></div>`}
      ${(() => {
        // 이번 주 월요일 00:00 기준
        const now = new Date();
        const day = now.getDay(); // 0=일,1=월...
        const mondayOffset = day === 0 ? -6 : 1 - day;
        const monday = new Date(now);
        monday.setHours(0,0,0,0);
        monday.setDate(now.getDate() + mondayOffset);
        const mondayTs = monday.getTime();

        // 각 회원의 이번 주 기록 수 계산 (날짜 기반: m/d 형식)
        // 단순 카운트: records 중 date가 이번 주인 것
        // date는 "M/D" 형식이라 올해 기준으로 비교
        const scores = members.map(m => {
          const count = Object.values(m.records).filter(r => {
            if (!r.date) return false;
            const [mo, dd] = r.date.split('/').map(Number);
            const d = new Date(now.getFullYear(), mo-1, dd);
            return d.getTime() >= mondayTs;
          }).length;
          return { name: m.name, count };
        }).filter(x => x.count > 0).sort((a,b) => b.count - a.count);

        const mvp = scores[0];
        if (!mvp) return `<div class="action-card" style="cursor:default">
          <div class="action-card-icon">🌟</div>
          <div class="action-card-title">이번 주 MVP</div>
          <div class="action-card-sub">아직 기록이 없어요</div>
        </div>`;

        return `<div class="action-card" style="cursor:default;position:relative;overflow:hidden">
          <div style="position:absolute;top:10px;right:12px;background:#EBF3FE;color:#3182F6;font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;letter-spacing:.3px">MVP</div>

          <div style="font-size:16px;font-weight:800;color:#1A1A2E;margin-bottom:4px;letter-spacing:-.3px">${mvp.name}</div>
          <div style="font-size:12px;color:#8B95A1">이번 주 <strong style="color:#3182F6;font-weight:700">${mvp.count}개</strong> 기록</div>
        </div>`;
      })()}
    </div>
    <!-- 새 회원 등록 버튼 — 재방문자면 숨김 -->

      const lastId = loadLastMember();
      const isReturning = lastId && members.some(m => m.id === lastId);
      if (isReturning) return "";
      return `<div style="padding:12px 20px 0">

        <div style="font-size:13px;color:#8B95A1;margin-bottom:16px">이름을 입력해주세요</div>
        <input class="modal-input" id="inp-register-name" placeholder="이름 입력" value="${S.registerName}" autocomplete="off"/>
        ${S.registerErr ? `<div class="err-msg" style="text-align:left;margin-top:6px">${S.registerErr}</div>` : ""}
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="modal-btn-cancel" id="btn-register-cancel" style="flex:1;height:48px">취소</button>
          <button class="modal-btn-save" id="btn-register-next" style="flex:2;height:48px">다음 →</button>
        </div>
      ` : `
        <!-- Step 2: 캐릭터 선택 -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button id="btn-register-back" style="background:none;border:none;cursor:pointer;font-size:18px;padding:0;line-height:1">←</button>
          <div class="modal-title" style="margin:0">캐릭터 선택</div>
          <div style="font-size:12px;color:#8B95A1;margin-left:auto">선택 안 해도 됩니다</div>
        </div>
        <div style="overflow-y:auto;max-height:340px">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
            ${renderRegisterAvatarGrid()}
          </div>
        </div>
        <button class="modal-btn-save" id="btn-register-save" style="width:100%;height:48px;margin-top:14px;border-radius:12px">
          ${S.registerName} 으로 시작하기 🎉
        </button>
      `}
    </div>
  </div>` : ""}
  ${S.pinModal ? `<div class="pin-modal-overlay" id="pin-overlay">
    <div class="pin-modal-box" onclick="event.stopPropagation()">
      <div class="pin-modal-title">코치 로그인</div>

      <button class="pin-confirm-btn" id="btn-pin">확인</button>
    </div></div>` : ""}
  </div>`;
}

/* ── RANK ── */
function renderRank() {
  return `<div class="rank-page">
    <div class="rank-page-nav">
      <button class="nav-back icon-btn" id="btn-rank-back">${ico.chevL}</button>
      <span class="nav-title" style="flex:1;font-size:17px;font-weight:700">세션 1등</span>
      <div style="width:32px"></div>
    </div>
    <div class="rank-page-body">
      ${WODS.map(wod => {
        const first = lb(wod.id)[0]||null;
        return `<div class="rank-row-card">
          <div class="rank-row-wod-info">
            <span class="rank-row-wod-num">WOD ${wod.id}</span>
            <span class="rank-row-wod-name">${wod.name}</span>
            ${wod.detail?`<span class="rank-row-wod-detail">${wod.detail}</span>`:""}
          </div>
          ${first
            ? `<div class="rank-row-result">
                <span style="font-size:26px;flex-shrink:0">🥇</span>
                <div class="rank-first-info">
                  <span class="rank-first-name">${first.name}</span>
                  <span class="rank-first-val">${first.value}</span>
                </div>
                ${first.scale?`<span class="pill-blue" style="margin-left:auto">${first.scale}</span>`:""}
              </div>`
            : `<div class="rank-row-empty-box">기록 없음</div>`
          }
        </div>`;
      }).join("")}
      <div style="height:40px"></div>
    </div></div>`;
}

/* ── MEMBER ── */
function renderMember() {
  const m = members.find(x => x.id===S.activeMemberId);
  if (!m) { S.view="login"; return renderLogin(); }
  const done = Object.keys(m.records).length;
  const pct  = Math.round(done/WODS.length*100);
  const wodRows = WODS.map(wod => {
    const rec=m.records[wod.id]; const isEd=S.editing?.memberId===m.id&&S.editing?.wodId===wod.id;
    return wodRowHtml(wod,rec,isEd,m.id,false);
  }).join("");

/* ── COACH ── */

  /* rename / delete member modals */
  const renameModal = S.editingMember ? `
  <div class="modal-overlay" id="mo-rename">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">이름 수정</div>
      <input class="modal-input" id="inp-rename" value="${S.editingMember.name}" placeholder="이름 입력"/>
      <div class="modal-btns"><button class="modal-btn-cancel" id="btn-rename-cancel">취소</button><button class="modal-btn-save" id="btn-rename-save">저장</button></div>
    </div></div>` : "";

  const delModal = S.confirmDelete ? (() => {
    const t=members.find(m=>m.id===S.confirmDelete);
    return `<div class="modal-overlay" id="mo-del">
      <div class="modal-box" onclick="event.stopPropagation()">

        <div class="modal-desc"><strong>${t?.name}</strong> 회원을 삭제할까요?<br/><span style="color:#8B95A1;font-size:13px">모든 기록도 함께 삭제돼요.</span></div>
        <div class="modal-btns"><button class="modal-btn-cancel" id="btn-del-cancel">취소</button><button class="modal-btn-delete" id="btn-del-ok">삭제</button></div>
      </div></div>`;
  })() : "";

  const addBox = S.addingMember ? `
  <div class="add-box">
    <input class="add-input" id="inp-newname" placeholder="이름 입력" value="${S.newName}" autofocus/>
    <div class="edit-btns"><button class="btn-cancel" id="btn-add-cancel">취소</button><button class="btn-save" id="btn-add-save">추가</button></div>
  </div>` : "";

  return `<div style="min-height:100vh;background:#F2F4F6;display:flex;flex-direction:column">
    <div class="nav">
      <button class="nav-back icon-btn" id="btn-coach-back">${ico.chevL}</button>
      <div class="nav-title">코치 대시보드</div>
      <div class="tab-group">
        <button class="tab-btn${S.coachTab==="sheet"?" active":""}" data-ctab="sheet">시트</button>
        <button class="tab-btn${S.coachTab==="rank"?" active":""}" data-ctab="rank">순위</button>
        <button class="tab-btn${S.coachTab==="wod"?" active":""}" data-ctab="wod">WOD</button>
        <button class="tab-btn${S.coachTab==="msg"?" active":""}" data-ctab="msg">한마디</button>
      </div>
    </div>
    ${S.coachTab==="sheet" ? `
    <div class="coach-layout">
      <div class="sidebar">
        <div class="sidebar-head"><span class="sidebar-count">회원 ${members.length}명</span>
          <button class="add-member-btn" id="btn-add-member">${ico.plus} 추가</button></div>
        ${addBox}${sideRows}
      </div>
      <div class="sheet-panel">${sheet}</div>
    </div>`
    : S.coachTab==="rank" ? `<div style="overflow-y:auto;flex:1">${lbPanel}</div>`
    : S.coachTab==="wod"  ? wodManager
    : `<div style="flex:1;padding:24px 20px;max-width:480px;width:100%;margin:0 auto">
        <div class="card">
          <div class="card-label">코치의 한마디</div>
          <div style="font-size:13px;color:#8B95A1;margin-bottom:12px">메인 화면 상단에 표시됩니다</div>
          <textarea id="inp-coach-msg" maxlength="100"
            style="width:100%;height:120px;background:#F2F4F6;border:1.5px solid #3182F6;border-radius:12px;padding:12px 14px;font-size:15px;line-height:1.6;resize:none;outline:none;font-family:inherit;color:#1A1A2E;box-sizing:border-box"
            placeholder="회원들에게 전할 메시지 (최대 100자)">${coachMessage}</textarea>

```
      <div style="display:flex;justify-content:flex-end;margin-top:6px"><span id="msg-counter" style="font-size:12px;color:#B0B8C1">${coachMessage.length}/100</span></div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="btn-msg-clear" class="btn-cancel" style="flex:1;height:44px">지우기</button>
        <button id="btn-msg-save" class="btn-save" style="flex:2;height:44px">저장</button>
      </div>
    </div>
  </div>`}
${renameModal}${delModal}${wodEditOverlay}
```

  </div>`;

/* ── WOD ROW ── */
function wodRowHtml(wod,rec,isEd,memberId,showDel) {
let body=””;
if (isEd) {
body=`<div class="edit-area"> <div class="time-input-row"> <div class="time-field-wrap"><input class="time-field" id="inp-min" type="number" min="0" max="99" placeholder="0" value="${S.timeVal.min}" inputmode="numeric"/><span class="time-field-label">분</span></div> <span class="time-sep">:</span> <div class="time-field-wrap"><input class="time-field" id="inp-sec" type="number" min="0" max="59" placeholder="00" value="${S.timeVal.sec}" inputmode="numeric"/><span class="time-field-label">초</span></div> </div> <input class="edit-sub" id="inp-escale" placeholder="스케일 (선택 · RX, Scaled 등)" value="${S.editVal.scale}" style="margin-top:4px"/> <div class="edit-btns" style="margin-top:2px"> <button class="btn-cancel" id="btn-edit-cancel">취소</button> <button class="btn-save" data-save="${memberId}" data-wid="${wod.id}">저장</button> </div></div>`;
} else if (rec) {
body=`<div class="rec-row"> <span class="rec-val">${rec.value}</span> ${rec.scale?`<span class="rec-scale">${rec.scale}</span>`:""} <span class="rec-date">${rec.date}</span> <button class="icon-btn" data-oedit="${memberId}" data-owid="${wod.id}">${ico.edit}</button> ${showDel?`<button class="icon-btn" data-drec="${memberId}" data-dwid="${wod.id}">${ico.trash}</button>`:""} </div>`;
} else {
body=`<button class="add-rec-btn" data-oedit="${memberId}" data-owid="${wod.id}">+ 기록 추가</button>`;
}
return `<div class="wod-row${rec?" done":""}"> <div class="wod-badge${rec?" done":""}">${wod.id}</div> <div class="wod-content"> <div class="wod-name">${wod.name}</div> ${wod.detail?`<div class="wod-detail">${wod.detail}</div>`:""} ${body} </div></div>`;
}

/* ══ BIND ══ */
function updateMemberGrid() {
const container = document.getElementById(“member-grid-container”);
if (!container) return;
const fil = members.filter(m => m.name.includes(S.search));
container.innerHTML = fil.length===0
? `<div class="empty-search">"${S.search}" 검색 결과가 없어요</div>`
: `<div class="member-grid">${fil.map(m => { const hasDone = Object.keys(m.records).length>0; return `<button class="member-cell" data-login="${m.id}">
<div class="member-cell-av">${m.name[0]}${hasDone?`<div class="member-cell-dot"></div>`:””} </div>
<span class="member-cell-name">${m.name}</span></button>`; }).join("")}</div>`;
container.querySelectorAll(”[data-login]”).forEach(el => {
el.addEventListener(“click”, () => { S.activeMemberId=el.dataset.login; S.memberTab=“my”; S.view=“member”; render(); });
});
const cb = document.getElementById(“btn-clear”);
if (cb) cb.style.display = S.search?“flex”:“none”;
}

function showToast(msg) {
document.querySelector(”.toast”)?.remove();
const el=document.createElement(“div”); el.className=“toast”;
el.innerHTML=`<span>✓</span>${msg}`; document.body.appendChild(el);
setTimeout(()=>el.remove(),2100);
}

function bind() {
const g=id=>document.getElementById(id);
const on=(id,ev,fn)=>{const el=g(id);if(el)el.addEventListener(ev,fn);};
const qa=(sel,fn)=>document.querySelectorAll(sel).forEach(fn);

/* login search */
const searchEl=g(“inp-search”);
if (searchEl) {
let composing=false;
searchEl.addEventListener(“compositionstart”,()=>{composing=true;});
searchEl.addEventListener(“compositionend”,e=>{composing=false;S.search=e.target.value;updateMemberGrid();});
searchEl.addEventListener(“input”,e=>{if(composing)return;S.search=e.target.value;updateMemberGrid();});
}
on(“btn-clear”,“click”,()=>{S.search=””;const el=g(“inp-search”);if(el)el.value=””;updateMemberGrid();});
on(“btn-rank”,“click”,()=>{S.view=“rank”;render();});
on(“btn-show-register”,“click”,()=>{S.registerModal=true;S.registerStep=1;S.registerName=””;S.registerErr=””;S.registerAvatar=null;render();setTimeout(()=>document.getElementById(“inp-register-name”)?.focus(),60);});
on(“btn-register-cancel”,“click”,()=>{S.registerModal=false;render();});
document.getElementById(“mo-register”)?.addEventListener(“click”,()=>{S.registerModal=false;render();});
on(“inp-register-name”,“input”,e=>{S.registerName=e.target.value;S.registerErr=””;});
on(“inp-register-name”,“keydown”,e=>{if(e.key===“Enter”)doRegisterNext();});
on(“btn-register-next”,“click”,doRegisterNext);
on(“btn-register-back”,“click”,()=>{S.registerStep=1;render();setTimeout(()=>document.getElementById(“inp-register-name”)?.focus(),60);});
on(“btn-register-save”,“click”,doRegisterMember);
document.querySelectorAll(”[data-reg-avatar]”).forEach(el=>el.addEventListener(“click”,()=>{
S.registerAvatar=parseInt(el.dataset.regAvatar);render();
}));
on(“btn-open-pin”,“click”,()=>{S.pinModal=true;S.pin=””;S.pinErr=false;render();setTimeout(()=>g(“inp-pin”)?.focus(),60);});
on(“pin-overlay”,“click”,()=>{S.pinModal=false;S.pin=””;S.pinErr=false;render();});
on(“inp-pin”,“input”,e=>{S.pin=e.target.value;S.pinErr=false;});
on(“inp-pin”,“keydown”,e=>{if(e.key===“Enter”)doLogin();});
on(“btn-pin”,“click”,doLogin);

/* member login */
qa(”[data-login]”,el=>el.addEventListener(“click”,()=>{S.activeMemberId=el.dataset.login;S.memberTab=“my”;S.view=“member”;render();}));

/* rank */
on(“btn-rank-back”,“click”,()=>{S.view=“login”;render();});

/* member nav */
on(“btn-member-back”,“click”,()=>{S.view=“login”;S.editing=null;render();});
qa(”[data-mtab]”,el=>el.addEventListener(“click”,()=>{S.memberTab=el.dataset.mtab;render();}));

/* avatar picker */
on(“btn-pick-avatar”,“click”,()=>{S.avatarModal=S.activeMemberId;render();});
on(“btn-avatar-cancel”,“click”,()=>{S.avatarModal=false;render();});
on(“btn-avatar-reset”,“click”,()=>{
fbUpdate(`members/${S.activeMemberId}`,{avatar:null});
S.avatarModal=false;
});
g(“mo-avatar”)?.addEventListener(“click”,()=>{S.avatarModal=false;render();});
qa(”[data-pick-avatar]”,el=>el.addEventListener(“click”,e=>{
e.stopPropagation();
const idx=parseInt(el.dataset.pickAvatar);
fbUpdate(`members/${S.activeMemberId}`,{avatar:idx});
S.avatarModal=false;
render();
showToast(“캐릭터가 저장됐어요! 🐾”);
}));

/* coach nav */
on(“btn-coach-back”,“click”,()=>{S.view=“login”;S.editing=null;S.panelId=null;render();});
qa(”[data-ctab]”,el=>el.addEventListener(“click”,()=>{S.coachTab=el.dataset.ctab;render();}));

/* select member */
qa(”[data-sel]”,el=>el.addEventListener(“click”,()=>{S.panelId=el.dataset.sel;S.editing=null;render();}));

/* add member */
on(“btn-add-member”,“click”,()=>{S.addingMember=true;render();setTimeout(()=>g(“inp-newname”)?.focus(),50);});
on(“inp-newname”,“input”,e=>{S.newName=e.target.value;});
on(“inp-newname”,“keydown”,e=>{if(e.key===“Enter”)doAddMember();});
on(“btn-add-cancel”,“click”,()=>{S.addingMember=false;S.newName=””;render();});
on(“btn-add-save”,“click”,doAddMember);

/* rename member */
qa(”[data-rename]”,el=>el.addEventListener(“click”,e=>{
e.stopPropagation();S.editingMember={id:el.dataset.rename,name:el.dataset.rname};
render();setTimeout(()=>g(“inp-rename”)?.focus(),50);
}));
on(“btn-rename-cancel”,“click”,()=>{S.editingMember=null;render();});
on(“btn-rename-save”,“click”,doRename);
on(“inp-rename”,“keydown”,e=>{if(e.key===“Enter”)doRename();});
g(“mo-rename”)?.addEventListener(“click”,()=>{S.editingMember=null;render();});

/* delete member */
qa(”[data-delconfirm]”,el=>el.addEventListener(“click”,e=>{
e.stopPropagation();S.confirmDelete=el.dataset.delconfirm;render();
}));
on(“btn-del-cancel”,“click”,()=>{S.confirmDelete=null;render();});
on(“btn-del-ok”,“click”,()=>doDeleteMember(S.confirmDelete));
g(“mo-del”)?.addEventListener(“click”,()=>{S.confirmDelete=null;render();});

/* record edit */
qa(”[data-oedit]”,el=>el.addEventListener(“click”,()=>{
const mid=el.dataset.oedit,wid=parseInt(el.dataset.owid);
const m=members.find(x=>x.id===mid); const r=m?.records[wid]||{};
S.editing={memberId:mid,wodId:wid}; S.editVal={scale:r.scale||””};
const match=r.value?.match(/^(\d+)’(\d+)/);
S.timeVal=match?{min:match[1],sec:match[2]}:{min:””,sec:””};
render();setTimeout(()=>g(“inp-min”)?.focus(),50);
}));
on(“btn-edit-cancel”,“click”,()=>{S.editing=null;render();});
on(“inp-min”,“input”,e=>{S.timeVal.min=e.target.value;});
on(“inp-sec”,“input”,e=>{S.timeVal.sec=e.target.value;});
on(“inp-escale”,“input”,e=>{S.editVal.scale=e.target.value;});
on(“inp-sec”,“keydown”,e=>{if(e.key===“Enter”){const btn=document.querySelector(”[data-save]”);if(btn)doSaveRecord(btn.dataset.save,parseInt(btn.dataset.wid));}});
qa(”[data-save]”,el=>el.addEventListener(“click”,()=>doSaveRecord(el.dataset.save,parseInt(el.dataset.wid))));
qa(”[data-drec]”,el=>el.addEventListener(“click”,()=>fbRemove(`members/${el.dataset.drec}/records/${el.dataset.dwid}`)));

/* WOD manager */
on(“btn-wod-add-toggle”,“click”,()=>{S.showWodForm=!S.showWodForm;S.wodFormVal={name:””,detail:””};render();setTimeout(()=>g(“wod-inp-name”)?.focus(),50);});
on(“wod-inp-name”,“input”,e=>{S.wodFormVal.name=e.target.value;});
on(“wod-inp-detail”,“input”,e=>{S.wodFormVal.detail=e.target.value;});
on(“btn-wod-add-cancel”,“click”,()=>{S.showWodForm=false;render();});
on(“btn-wod-add-save”,“click”,doAddWod);
qa(”[data-wod-edit]”,el=>el.addEventListener(“click”,()=>{
const wod=WODS.find(w=>w.id===parseInt(el.dataset.wodEdit));
if(wod){S.editingWod={…wod};render();setTimeout(()=>g(“wod-edit-name”)?.focus(),50);}
}));
on(“btn-wod-edit-cancel”,“click”,()=>{S.editingWod=null;render();});
on(“btn-wod-edit-save”,“click”,doEditWod);
on(“wod-edit-name”,“keydown”,e=>{if(e.key===“Enter”)g(“wod-edit-detail”)?.focus();});
on(“wod-edit-detail”,“keydown”,e=>{if(e.key===“Enter”)doEditWod();});
g(“wod-edit-overlay”)?.addEventListener(“click”,()=>{S.editingWod=null;render();});
qa(”[data-wod-del]”,el=>el.addEventListener(“click”,()=>doDeleteWod(parseInt(el.dataset.wodDel))));

/* coach message */
const msgEl=g(“inp-coach-msg”); const counterEl=g(“msg-counter”);
if(msgEl) msgEl.addEventListener(“input”,()=>{if(counterEl)counterEl.textContent=`${msgEl.value.length}/100`;});
on(“btn-msg-save”,“click”,()=>{const val=g(“inp-coach-msg”)?.value.trim()??””;fbSet(“coachMessage”,val);showToast(“한마디가 저장됐어요!”);});
on(“btn-msg-clear”,“click”,()=>{const el=g(“inp-coach-msg”);if(el){el.value=””;if(counterEl)counterEl.textContent=“0/100”;}fbSet(“coachMessage”,””);showToast(“한마디를 지웠어요”);});

/* PWA install */
on(“install-btn”,“click”,doInstall);
}

/* ══ ACTIONS ══ */
function doLogin() {
const el=document.getElementById(“inp-pin”); const v=el?el.value:S.pin;
if(v===PIN){S.view=“coach”;S.pin=””;S.pinErr=false;S.pinModal=false;render();}
else{S.pinErr=true;render();setTimeout(()=>document.getElementById(“inp-pin”)?.focus(),50);}
}

function doSaveRecord(mid,wid) {
const min=parseInt(document.getElementById(“inp-min”)?.value??S.timeVal.min)||0;
const sec=parseInt(document.getElementById(“inp-sec”)?.value??S.timeVal.sec)||0;
const scale=(document.getElementById(“inp-escale”)?.value??S.editVal.scale).trim();
if(min===0&&sec===0)return;
const value=`${min}'${String(sec).padStart(2,"0")}"`;
S.editing=null;S.timeVal={min:””,sec:””};S.editVal={value:””,scale:””};render();
fbSet(`members/${mid}/records/${wid}`,{value,scale,date:today()});
const wod=WODS.find(w=>w.id===wid);
showToast(`${wod?.name??"WOD"} 기록 저장 완료!`);
}

function doAddMember() {
const name=(document.getElementById(“inp-newname”)?.value||S.newName).trim();
if(!name)return;
fbPush(“members”,{name,records:{}});
S.addingMember=false;S.newName=””;
}

function doRegisterNext() {
const nameEl = document.getElementById(“inp-register-name”);
const name = (nameEl?.value || S.registerName).trim();
if (!name) { S.registerErr=“이름을 입력해주세요”; render(); return; }
// 중복 체크 — 이미 등록된 회원이면 바로 입장
const dup = members.find(m => m.name === name);
if (dup) {
S.registerModal=false; S.registerName=””; S.registerErr=””;
S.activeMemberId=dup.id; S.memberTab=“my”; S.view=“member”;
saveLastMember(dup.id); render(); return;
}
S.registerName = name;
S.registerStep = 2;
render();
}

function doRegisterMember() {
const name = S.registerName.trim();
if (!name) return;
const avatarIdx = S.registerAvatar;
const data = avatarIdx !== null ? {name, records:{}, avatar:avatarIdx} : {name, records:{}};
fbPush(“members”, data).then(ref=>{
S.registerModal=false; S.registerName=””; S.registerErr=””; S.registerAvatar=null; S.registerStep=1;
S.activeMemberId=ref.key; S.memberTab=“my”; S.view=“member”;
saveLastMember(ref.key);
render();
showToast(`${name}님 환영해요! 🎉`);
});
}

function doRename() {
const name=(document.getElementById(“inp-rename”)?.value||S.editingMember?.name||””).trim();
if(!name||!S.editingMember)return;
fbUpdate(`members/${S.editingMember.id}`,{name});S.editingMember=null;
}

function doDeleteMember(id) {
fbRemove(`members/${id}`);if(S.panelId===id)S.panelId=null;S.confirmDelete=null;
}

/* WOD actions */
function doAddWod() {
const name=(document.getElementById(“wod-inp-name”)?.value||S.wodFormVal.name).trim();
const detail=(document.getElementById(“wod-inp-detail”)?.value||S.wodFormVal.detail).trim();
if(!name)return;
const maxId=WODS.length>0?Math.max(…WODS.map(w=>w.id)):0;
const newId=maxId+1;
fbSet(`wods/${newId}`,{name,detail});
S.showWodForm=false;S.wodFormVal={name:””,detail:””};
showToast(`WOD ${newId} 추가됐어요!`);
}

function doEditWod() {
const name=(document.getElementById(“wod-edit-name”)?.value||S.editingWod?.name||””).trim();
const detail=(document.getElementById(“wod-edit-detail”)?.value||S.editingWod?.detail||””).trim();
if(!name||!S.editingWod)return;
fbSet(`wods/${S.editingWod.id}`,{name,detail});
S.editingWod=null;showToast(“WOD가 수정됐어요!”);
}

function doDeleteWod(id) {
if(WODS.length<=1){showToast(“WOD는 최소 1개 필요해요”);return;}
fbRemove(`wods/${id}`);
// 해당 WOD 기록도 정리
members.forEach(m=>{if(m.records[id])fbRemove(`members/${m.id}/records/${id}`)});
showToast(“WOD가 삭제됐어요”);
}

/* PWA install */
let deferredPrompt=null;
window.addEventListener(“beforeinstallprompt”,e=>{e.preventDefault();deferredPrompt=e;showInstallBanner();});
function showInstallBanner(){
if(document.getElementById(“install-banner”))return;
const b=document.createElement(“div”);b.id=“install-banner”;
b.style.cssText=“position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:12px 20px;border-radius:14px;display:flex;align-items:center;gap:12px;z-index:9000;box-shadow:0 8px 32px rgba(0,0,0,.25);font-family:inherit;white-space:nowrap;font-size:14px;font-weight:600;”;
b.innerHTML=`<span style="font-size:20px">📲</span><span>홈 화면에 추가하기</span><button id="install-btn" style="background:#3182F6;border:none;color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;">추가</button><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#8B95A1;font-size:18px;cursor:pointer;padding:0 2px;">×</button>`;
document.body.appendChild(b);
}
async function doInstall(){
if(!deferredPrompt)return;
deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById(“install-banner”)?.remove();
}
</script>

</body>
</html>
