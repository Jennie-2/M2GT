<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background:#F2F4F6;color:#1A1A2E;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* ── COLORS ──
  Blue:    #3182F6
  Blue-lt: #EBF3FE
  Gray-bg: #F2F4F6
  Gray-1:  #E8EBED
  Gray-2:  #8B95A1
  Gray-3:  #B0B8C1
  Text:    #1A1A2E
  Red:     #F04452
  Green:   #00C471
*/

/* ── LAYOUT ── */
#app{height:100%;display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── NAV BAR ── */
.nav{display:flex;align-items:center;height:54px;padding:0 16px;background:#fff;
  border-bottom:1px solid #E8EBED;flex-shrink:0;gap:8px}
.nav-back{background:none;border:none;padding:6px;display:flex;align-items:center;border-radius:8px;color:#1A1A2E}
.nav-title{flex:1;font-size:17px;font-weight:700;letter-spacing:-.4px}
.nav-action{background:none;border:none;padding:6px;display:flex;align-items:center;color:#3182F6;font-size:14px;font-weight:600}

/* ── BOTTOM TAB BAR ── */
.tab-bar{display:flex;background:#fff;border-top:1px solid #E8EBED;flex-shrink:0;
  padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 0;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab-icon{font-size:22px;line-height:1}
.tab-label{font-size:10px;font-weight:600;color:#B0B8C1}
.tab-item.active .tab-label{color:#3182F6}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── CARDS ── */
.card{background:#fff;border-radius:18px;padding:18px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.05)}
.card+.card{margin-top:10px}

/* ── SECTION HEADER ── */
.section-header{font-size:12px;font-weight:700;color:#8B95A1;letter-spacing:.5px;
  padding:16px 20px 8px}

/* ── BUTTONS ── */
.btn-primary{height:52px;background:#3182F6;border:none;border-radius:14px;
  font-size:16px;font-weight:700;color:#fff;width:100%;transition:opacity .12s}
.btn-primary:active{opacity:.8}
.btn-secondary{height:52px;background:#F2F4F6;border:none;border-radius:14px;
  font-size:16px;font-weight:600;color:#8B95A1;width:100%}
.btn-danger{height:48px;background:#F04452;border:none;border-radius:12px;
  font-size:15px;font-weight:700;color:#fff;width:100%}
.btn-sm{height:34px;border:none;border-radius:10px;font-size:13px;font-weight:700;padding:0 14px}
.btn-sm-blue{background:#EBF3FE;color:#3182F6}
.btn-sm-red{background:#FEF2F2;color:#F04452}
.btn-sm-gray{background:#F2F4F6;color:#8B95A1}

/* ── INPUT ── */
.input{width:100%;height:50px;background:#F2F4F6;border:1.5px solid transparent;
  border-radius:13px;padding:0 15px;font-size:15px;color:#1A1A2E;outline:none;transition:border-color .15s}
.input:focus{border-color:#3182F6;background:#EBF3FE}
.input.err{border-color:#F04452}
.input-label{font-size:12px;font-weight:700;color:#8B95A1;margin-bottom:6px}
.input-group{display:flex;flex-direction:column;gap:4px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .18s ease}
.modal-box{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;
  padding:24px 20px calc(24px + env(safe-area-inset-bottom));animation:slideUp .22s ease;
  display:flex;flex-direction:column;gap:12px}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-.4px}
.modal-center{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .18s ease}
.modal-center-box{background:#fff;border-radius:20px;width:100%;max-width:340px;
  padding:24px 20px 20px;display:flex;flex-direction:column;gap:12px;animation:popIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}

/* ── AVATAR ── */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}

/* ── CHIP ── */
.chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;
  font-size:11px;font-weight:700}
.chip-blue{background:#EBF3FE;color:#3182F6}
.chip-green{background:#E6FAF0;color:#00C471}
.chip-gray{background:#F2F4F6;color:#8B95A1}
.chip-red{background:#FEF2F2;color:#F04452}

/* ── BADGE ── */
.badge{position:absolute;top:2px;right:2px;width:10px;height:10px;
  border-radius:50%;border:2px solid #fff}
.badge-green{background:#00C471}
.badge-blue{background:#3182F6}

/* ── LIST ROW ── */
.list-row{display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:#fff;border-bottom:1px solid #F2F4F6}
.list-row:last-child{border-bottom:none}

/* ── PROGRESS ── */
.progress-track{height:5px;background:#E8EBED;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;transition:width .4s}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:#1A1A2E;color:#fff;padding:12px 20px;border-radius:14px;
  font-size:14px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,.22);z-index:9999;pointer-events:none;
  animation:toastIn .22s ease,toastOut .3s ease 1.7s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:14px}
.spinner{width:32px;height:32px;border:3px solid #E8EBED;border-top-color:#3182F6;
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN SCREEN ── */
.login-screen{flex:1;overflow-y:auto;background:#F2F4F6}
.login-hero{background:#fff;padding:28px 20px 20px}
.login-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.login-logo{font-size:15px;font-weight:800;color:#3182F6;display:flex;align-items:center;gap:7px}
.login-greeting{font-size:24px;font-weight:800;letter-spacing:-.5px;line-height:1.3;color:#1A1A2E}
.login-greeting em{color:#3182F6;font-style:normal}

/* ── MEMBER GRID ── */
.member-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.member-cell{display:flex;flex-direction:column;align-items:center;gap:6px;
  background:none;border:none;padding:10px 4px;border-radius:14px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:background .12s}
.member-cell:active{background:#EBF3FE}
.member-cell-av{width:52px;height:52px;border-radius:50%;position:relative;flex-shrink:0;
  background:#EBF3FE;display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#3182F6;
  box-shadow:0 2px 8px rgba(49,130,246,.12)}
.member-cell-name{font-size:11px;font-weight:600;color:#1A1A2E;text-align:center;
  width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── PIN INPUT ── */
.pin-dots{display:flex;gap:14px;justify-content:center;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#E8EBED;transition:background .15s}
.pin-dot.filled{background:#3182F6}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px}
.pin-key{height:62px;background:#F2F4F6;border:none;border-radius:16px;
  font-size:22px;font-weight:600;color:#1A1A2E;cursor:pointer;transition:background .1s;
  display:flex;align-items:center;justify-content:center}
.pin-key:active{background:#E8EBED}
.pin-key.del{font-size:18px}
.pin-key.empty{background:transparent;cursor:default}

/* ── WOD ROWS ── */
.wod-group-header{font-size:11px;font-weight:800;color:#8B95A1;letter-spacing:.7px;
  padding:14px 20px 6px;background:#F2F4F6}
.wod-row{display:flex;align-items:flex-start;gap:12px;background:#fff;
  border-bottom:1px solid #F2F4F6;padding:14px 16px}
.wod-row.done{border-left:3px solid #3182F6}
.wod-num{width:26px;height:26px;border-radius:8px;background:#F2F4F6;color:#8B95A1;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.wod-num.done{background:#3182F6;color:#fff}
.wod-content{flex:1;min-width:0}
.wod-name{font-size:14px;font-weight:700}
.wod-detail{font-size:12px;color:#8B95A1;margin-top:2px}
.rec-val{font-size:18px;font-weight:800;letter-spacing:-.4px;margin-top:8px;display:block}
.rec-meta{display:flex;align-items:center;gap:8px;margin-top:4px;flex-wrap:wrap}
.rec-date{font-size:11px;color:#B0B8C1}
.add-rec-btn{margin-top:8px;background:#F2F4F6;border:1.5px dashed #E8EBED;
  border-radius:10px;padding:7px 14px;font-size:13px;font-weight:600;color:#8B95A1}

/* ── EDIT AREA ── */
.edit-area{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.time-row{display:flex;align-items:center;gap:8px}
.time-field-wrap{display:flex;flex-direction:column;align-items:center;flex:1}
.time-field{width:100%;height:52px;background:#F2F4F6;border:1.5px solid #3182F6;
  border-radius:12px;font-size:22px;font-weight:800;text-align:center;outline:none;
  color:#1A1A2E}
.time-label{font-size:11px;font-weight:700;color:#8B95A1;margin-top:4px}
.time-sep{font-size:22px;font-weight:800;color:#B0B8C1;padding-bottom:18px}

/* ── CALENDAR SLOTS ── */
.date-scroll{display:flex;gap:6px;overflow-x:auto;padding:14px 20px;
  scrollbar-width:none;-ms-overflow-style:none}
.date-scroll::-webkit-scrollbar{display:none}
.date-btn{flex-shrink:0;width:48px;padding:8px 0;border-radius:14px;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.date-btn .dow{font-size:10px;font-weight:700}
.date-btn .dd{font-size:17px;font-weight:800}
.slot-card{background:#fff;border-radius:16px;padding:14px 18px;margin-bottom:8px;
  box-shadow:0 1px 4px rgba(0,0,0,.05)}

/* ── COACH MENU ── */
.coach-menu-item{display:flex;align-items:center;gap:16px;background:#fff;border:none;
  border-radius:18px;padding:18px 20px;width:100%;text-align:left;cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,.05);-webkit-tap-highlight-color:transparent;transition:transform .1s}
.coach-menu-item:active{transform:scale(.98)}
.coach-menu-icon{font-size:28px;flex-shrink:0}
.coach-menu-label{flex:1;font-size:16px;font-weight:700;color:#1A1A2E}

/* ── SIDEBAR (coach sheet) ── */
.coach-layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:140px;flex-shrink:0;background:#fff;border-right:1px solid #E8EBED;
  overflow-y:auto}
.sidebar-row{display:flex;align-items:center;gap:8px;padding:10px 10px;cursor:pointer;
  border-bottom:1px solid #F2F4F6}
.sidebar-row.active{background:#EBF3FE}
.sidebar-name{font-size:13px;font-weight:600;color:#8B95A1;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.sidebar-name.active{color:#1A1A2E;font-weight:700}
.sheet-panel{flex:1;overflow-y:auto;background:#F2F4F6;padding:16px}

/* ── RANK ── */
.rank-card{background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:10px;
  box-shadow:0 1px 4px rgba(0,0,0,.05)}
.rank-card-head{display:flex;flex-direction:column;gap:3px;padding-bottom:10px;
  border-bottom:1px solid #F2F4F6;margin-bottom:8px}
.rank-row{display:flex;align-items:center;gap:10px;padding:7px 0;
  border-bottom:1px solid #F8F9FA}
.rank-row:last-child{border-bottom:none}
.rank-medal{width:26px;font-size:15px;text-align:center;flex-shrink:0}
.rank-name{flex:1;font-size:14px;font-weight:600}
.rank-val{font-size:15px;font-weight:800;letter-spacing:-.3px;color:#3182F6}

/* ── PASS CARD ── */
.pass-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#EBF3FE;
  border-radius:14px;margin-bottom:16px}

/* ── ICON BUTTON ── */
.icon-btn{background:none;border:none;padding:6px;display:flex;align-items:center;
  border-radius:8px;cursor:pointer;color:#8B95A1}

/* ── COACH MSG ── */
.coach-msg{background:linear-gradient(120deg,#3182F6,#60A5FA);border-radius:18px;
  padding:14px 18px;box-shadow:0 4px 16px rgba(49,130,246,.2)}
.coach-msg-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);
  letter-spacing:.4px;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.coach-msg-text{font-size:14px;font-weight:600;color:#fff;line-height:1.6;word-break:keep-all}

/* ── AVATAR PICKER ── */
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.avatar-btn{aspect-ratio:1;border-radius:14px;border:3px solid transparent;
  padding:0;cursor:pointer;overflow:hidden;background:#F2F4F6;position:relative}
.avatar-btn img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.avatar-btn.selected{border-color:#3182F6}
</style>
</head>

const fbSet    = (path,val) => set(ref(db,path),val);
const fbUpdate = (path,val) => update(ref(db,path),val);
const fbRemove = (path)     => remove(ref(db,path));
const fbPush   = (path,val) => push(ref(db,path),val);

onValue(ref(db,"members"), snap => {
  const raw = snap.val()||{};
  members = Object.entries(raw)
    .map(([id,m]) => ({id, name:m.name, avatar:m.avatar??null, pin:m.pin||"", records:m.records||{}}))
    .sort((a,b) => a.name.localeCompare(b.name,"ko"));
  render();
});
onValue(ref(db,"wods"), snap => {
  const raw = snap.val();
  if (raw) {
    WODS = Object.entries(raw)
      .map(([k,v]) => ({id:parseInt(k),name:v.name,detail:v.detail||"",group:v.group||"WOD",type:v.type||"time",youtube:v.youtube||""}))
      .sort((a,b) => a.id-b.id);
  } else {
    DEFAULT_WODS.forEach(w => fbSet(`wods/${w.id}`,{name:w.name,detail:w.detail,group:w.group,type:w.type}));
  }
  render();
});

/* ══ HELPERS ══ */
const today = () => { const d=new Date(); return `${d.getMonth()+1}/${d.getDate()}`; };
const isoToday = () => new Date().toISOString().slice(0,10);

function getWorkdays(count=14) {
  const days=[]; let d=new Date(); d.setHours(0,0,0,0);
  while(days.length<count) {
    if(d.getDay()>=1&&d.getDay()<=5) days.push(new Date(d));
    d.setDate(d.getDate()+1);
  }
  return days;
}

function getMemberAvatar(m) {
  return m?.avatar!=null ? AVATARS[m.avatar] : null;
}

function renderAvatar(m, size=40) {
  const src = getMemberAvatar(m);
  if (src) return `<div class="avatar" style="width:${size}px;height:${size}px"><img src="${src}"/></div>`;
  return `<div class="avatar" style="width:${size}px;height:${size}px;background:#EBF3FE;color:#3182F6;font-size:${Math.round(size*.38)}px">${m.name[0]}</div>`;
}

function parseRecordVal(value, type) {
  if (!value) return -Infinity;
  if (type==="time") {
    const m=value.match(/(\d+)'(\d+)/);
    return m ? parseInt(m[1])*60+parseInt(m[2]) : Infinity;
  }
  return parseFloat(value)||0;
}

function lb(wid) {
  const wod=WODS.find(w=>w.id===wid);
  const type=wod?.type||"time";
  return members
    .filter(m=>m.records[wid]?.value)
    .map(m=>({name:m.name,avatar:m.avatar,...m.records[wid]}))
    .sort((a,b)=>{
      const va=parseRecordVal(a.value,type), vb=parseRecordVal(b.value,type);
      return type==="time" ? va-vb : vb-va;
    });
}

function getYoutubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function renderYoutubeCard(url) {
  const id = getYoutubeId(url);
  if (!id) return "";
  const thumb = "https://img.youtube.com/vi/"+id+"/mqdefault.jpg";
  const link  = "https://youtu.be/"+id;
  return '<a href="'+link+'" target="_blank" rel="noopener" style="display:block;margin-top:10px;border-radius:12px;overflow:hidden;text-decoration:none;position:relative">'
    +'<img src="'+thumb+'" style="width:100%;display:block;border-radius:12px"/>'
    +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">'
    +'<div style="width:44px;height:44px;background:rgba(0,0,0,.65);border-radius:50%;display:flex;align-items:center;justify-content:center">'
    +'<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg>'
    +'</div></div></a>';
}

function showToast(msg) {
  document.querySelector(".toast")?.remove();
  const el=document.createElement("div"); el.className="toast";
  el.innerHTML=`<span>✓</span> ${msg}`; document.body.appendChild(el);
  setTimeout(()=>el.remove(),2100);
}

  if (S.loginStep==="list")      return renderLoginList();
  if (S.loginStep==="pin")       return renderLoginPin();
  if (S.loginStep==="register")  return renderLoginRegister();
  if (S.loginStep==="reg-avatar")return renderLoginRegAvatar();
  return renderLoginList();
}

function renderMemberGrid(list) {
  return '<div class="member-grid">' + list.map(m => {
    const src = getMemberAvatar(m);
    return `<button class="member-cell" data-select="${m.id}">
      <div class="member-cell-av">
        ${src ? `<img src="${src}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>` : m.name[0]}
        ${Object.keys(m.records).length>0 ? `<span class="badge badge-green"></span>` : ""}
      </div>
      <span class="member-cell-name">${m.name}</span>
    </button>`;
  }).join("") + '</div>';
}

function renderLoginPin() {
  const m = S.loginTarget;
  const src = getMemberAvatar(m);
  const filled = S.loginPin.length;
  return `<div class="login-screen" style="display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;gap:12px;padding:20px 20px 0">
      <button id="btn-pin-back" style="background:none;border:none;cursor:pointer;color:#1A1A2E">${ico.back}</button>
      <span style="font-size:16px;font-weight:700;color:#8B95A1">PIN 입력</span>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px 40px">
      ${src ? `<img src="${src}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;margin-bottom:12px"/>`
             : `<div style="width:72px;height:72px;border-radius:50%;background:#EBF3FE;color:#3182F6;font-size:28px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:12px">${m.name[0]}</div>`}
      <p style="font-size:18px;font-weight:800;color:#1A1A2E;margin-bottom:6px">${m.name}</p>
      ${S.loginPinErr ? `<p style="font-size:13px;color:#F04452;margin-bottom:10px">PIN이 올바르지 않아요</p>`
                       : `<p style="font-size:13px;color:#8B95A1;margin-bottom:10px">4자리 PIN을 입력하세요</p>`}
      <div class="pin-dots">
        ${[0,1,2,3].map(i=>`<div class="pin-dot ${i<filled?"filled":""}"></div>`).join("")}
      </div>
      <div class="pin-keypad" style="width:100%;max-width:280px;margin-top:20px">
        ${[1,2,3,4,5,6,7,8,9,"",0,"del"].map(k=>
          k==="" ? `<div class="pin-key empty"></div>` :
          k==="del" ? `<button class="pin-key del" data-pin-key="del">${ico.del}</button>` :
          `<button class="pin-key" data-pin-key="${k}">${k}</button>`
        ).join("")}
      </div>
      ${!m.pin ? `<button id="btn-skip-pin" style="margin-top:16px;background:none;border:none;color:#8B95A1;font-size:13px;cursor:pointer">PIN 없이 입장</button>` : ""}
    </div>
  </div>`;
}

/* ══ MEMBER ══ */
function renderMember() {
  const m = members.find(x=>x.id===S.activeMemberId);
  if (!m) { S.view="login"; return renderLogin(); }

  let content = "";
  if      (S.memberTab==="home")    content = renderMemberHome(m);
  else if (S.memberTab==="book")    content = renderMemberBook(m);
  else if (S.memberTab==="profile") content = renderMemberProfile(m);

  const rankModal = S.showRank ? renderRankModal() : "";

  return `<div class="screen">
    ${content}
    <div class="tab-bar">
      ${["home","book","profile"].map((tab,i)=>{
        const icons=["🏠","📅","👤"];
        const labels=["홈","예약","내 기록"];
        return `<button class="tab-item${S.memberTab===tab?" active":""}" data-tab="${tab}">
          <span class="tab-icon">${icons[i]}</span>
          <span class="tab-label">${labels[i]}</span>
        </button>`;
      }).join("")}
    </div>
    ${rankModal}
  </div>`;
}

function renderMemberHome(m) {
  const now = new Date();
  const days = getWorkdays(7);
  const selDate = S.bookDate || days[0].toISOString().slice(0,10);
  const dayClasses = classes[selDate]||{};
  const pass = passes[m.id];
  const selDayObj = new Date(selDate+"T00:00:00");
  const MONTHS=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];
  const DOWS=["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];
  const selDateStr=selDayObj.getFullYear()+"년 "+MONTHS[selDayObj.getMonth()]+" "+selDayObj.getDate()+"일";
  const selDowStr=DOWS[selDayObj.getDay()];
  const mySlots=CLASS_TIMES.filter(t=>!!(dayClasses[t]?.bookings||{})[m.id]);
  const todayISO=isoToday();

  const dateSel='<div class="date-scroll" style="background:#fff;padding:10px 20px 14px;border-bottom:1px solid #E8EBED">'
    +days.map(function(day){
      const iso=day.toISOString().slice(0,10);
      const active=iso===selDate;
      const isToday=iso===todayISO;
      return '<button class="date-btn" data-date="'+iso+'" style="background:'+(active?"#1A1A2E":"transparent")+';border:2px solid '+(active?"#1A1A2E":isToday?"#3182F6":"transparent")+';border-radius:16px">'
        +'<span class="dow" style="font-size:11px;font-weight:700;color:'+(active?"rgba(255,255,255,.7)":"#8B95A1")+'">'+DAY_KO[day.getDay()]+'</span>'
        +'<span class="dd" style="font-size:18px;font-weight:800;color:'+(active?"#fff":isToday?"#3182F6":"#1A1A2E")+'">'+day.getDate()+'</span>'
        +'</button>';
    }).join("")+'</div>';

  const slots=CLASS_TIMES.map(function(t){
    const slot=dayClasses[t]||{};
    const cnt=Object.keys(slot.bookings||{}).length;
    const cap=slot.capacity||10;
    const full=cnt>=cap;
    const isMine=!!(slot.bookings||{})[m.id];
    const parts=t.split("-").map(Number);
    const sdparts=selDate.split("-").map(Number);
    const isPast=now>new Date(sdparts[0],sdparts[1]-1,sdparts[2],parts[0],parts[1],0,0);
    return '<div class="slot-card" style="margin-bottom:8px;'+(isMine?"border-left:3px solid #3182F6":"")+'">'
      +'<div style="display:flex;align-items:center;gap:14px">'
      +'<div style="flex-shrink:0;width:52px;text-align:center">'
      +'<p style="font-size:17px;font-weight:800;color:'+(isPast?"#B0B8C1":"#1A1A2E")+'">'+TIME_LABELS[t]+'</p>'
      +'<p style="font-size:11px;color:'+(full?"#F04452":"#8B95A1")+';font-weight:600;margin-top:2px">'+cnt+'/'+cap+'명</p>'
      +'</div>'
      +'<div style="flex:1">'
      +'<div class="progress-track"><div class="progress-fill" style="width:'+Math.min(100,cnt/cap*100)+'%;background:'+(full?"#F04452":isMine?"#3182F6":"#E8EBED")+'"></div></div>'
      +(isMine?'<p style="font-size:12px;color:#3182F6;font-weight:700;margin-top:5px">✓ 예약됨</p>'
        :full?'<p style="font-size:12px;color:#F04452;font-weight:600;margin-top:5px">마감</p>'
        :isPast?'<p style="font-size:12px;color:#B0B8C1;margin-top:5px">종료</p>'
        :'<p style="font-size:12px;color:#8B95A1;margin-top:5px">예약 가능</p>')
      +'</div></div></div>';
  }).join("");

  const passText=!pass?"없음":pass.type==="unlimited"?"♾️ 무제한":"🎟️ 잔여 "+((pass.total||0)-(pass.used||0))+"회";
  const mySlotText=mySlots.length===0?"없음":mySlots.map(function(t){return TIME_LABELS[t];}).join(", ");

  return '<div class="screen">'
    +'<div class="nav" style="background:#fff;align-items:flex-start;padding-top:14px;padding-bottom:10px;height:auto">'
    +'<div style="flex:1"><p style="font-size:24px;font-weight:800;color:#1A1A2E;letter-spacing:-.5px">'+selDowStr+' <span style="color:#3182F6">·</span></p>'
    +'<p style="font-size:13px;color:#8B95A1;margin-top:2px">'+selDateStr+'</p></div>'
    +'<button id="btn-pick-avatar" style="background:none;border:none;cursor:pointer;padding:0;margin-top:2px">'+renderAvatar(m,42)+'</button>'
    +'</div>'
    +dateSel
    +'<div class="scroll" style="background:#F2F4F6">'
    +(coachMessage?'<div style="padding:14px 20px 0"><div class="coach-msg"><div class="coach-msg-label">💬 코치의 한마디</div><div class="coach-msg-text">'+coachMessage+'</div></div></div>':"")
    +'<div style="padding:14px 20px 0;display:flex;gap:10px">'
    +'<div class="card" style="flex:1;padding:14px"><p style="font-size:11px;font-weight:700;color:#8B95A1;margin-bottom:6px">이용권</p><p style="font-size:15px;font-weight:800;color:#1A1A2E">'+passText+'</p></div>'
    +'<div class="card" style="flex:1;padding:14px"><p style="font-size:11px;font-weight:700;color:#8B95A1;margin-bottom:6px">'+selDateStr.slice(6)+' 예약</p><p style="font-size:14px;font-weight:800;color:'+(mySlots.length>0?"#3182F6":"#B0B8C1")+'">'+mySlotText+'</p></div>'
    +'</div>'
    +'<p class="section-header">수업 현황</p>'
    +'<div style="padding:0 20px 24px">'+slots+'</div>'
    +'</div>'
    +(S.avatarPickerOpen?renderAvatarPickerModal(m):"")
    +'</div>';
}

function renderMemberBook(m) {
  const days = getWorkdays(14);
  const selDate = S.bookDate || days[0].toISOString().slice(0,10);
  const dayClasses = classes[selDate]||{};
  const pass = passes[m.id];
  const now = new Date();

  return `<div class="screen">
    <div class="nav">
      <div class="nav-title">수업 예약</div>
    </div>
    <div class="scroll" style="background:#F2F4F6">
      <!-- 이용권 정보 -->
      <div style="padding:14px 20px 0">
        ${!pass ? `<div class="card" style="color:#B0B8C1;font-size:13px;text-align:center">이용권이 없어요. 코치에게 문의하세요.</div>`
          : `<div class="pass-card">
              <span style="font-size:28px">${pass.type==="unlimited"?"♾️":"🎟️"}</span>
              <div>
                <p style="font-size:14px;font-weight:800;color:#1A1A2E">${pass.type==="unlimited"?"무제한 이용권":"횟수권"}</p>
                <p style="font-size:12px;color:#3182F6;margin-top:2px">${pass.type==="unlimited"
                  ? `만료: ${pass.expiry||"-"}`
                  : `잔여 ${(pass.total||0)-(pass.used||0)}회 · 만료: ${pass.expiry||"-"}`}</p>
              </div>
            </div>`}
      </div>
      <!-- 날짜 선택 -->
      <div class="date-scroll">
        ${days.map(day=>{
          const iso=day.toISOString().slice(0,10);
          const active=iso===selDate;
          return `<button class="date-btn" data-date="${iso}"
            style="background:${active?"#3182F6":"#F2F4F6"};border:2px solid ${active?"#3182F6":"transparent"}">
            <span class="dow" style="color:${active?"rgba(255,255,255,.8)":"#8B95A1"}">${DAY_KO[day.getDay()]}</span>
            <span class="dd"  style="color:${active?"#fff":"#1A1A2E"}">${day.getDate()}</span>
          </button>`;
        }).join("")}
      </div>
      <!-- 시간 슬롯 -->
      <div style="padding:0 20px 24px">
        ${CLASS_TIMES.map(t=>{
          const slot=dayClasses[t]||{};
          const bookings=slot.bookings||{};
          const cap=slot.capacity||10;
          const cnt=Object.keys(bookings).length;
          const isBooked=!!bookings[m.id];
          const full=cnt>=cap&&!isBooked;
          const [hh,mm]=t.split("-").map(Number);
          const [sy,smo,sd]=selDate.split("-").map(Number);
          const classDT=new Date(sy,smo-1,sd,hh,mm,0,0);
          const isPast=now>classDT;
          const canCancel=now<new Date(classDT.getTime()-3600000);
          const hasRemain=pass&&(pass.type==="unlimited"||(pass.total||0)-(pass.used||0)>0);

          let btn="";
          if(isPast) btn=`<span style="font-size:12px;color:#B0B8C1;font-weight:600">종료</span>`;
          else if(isBooked) btn=canCancel
            ? `<button data-cancel="${selDate}" data-time="${t}" class="btn-sm btn-sm-red">취소</button>`
            : `<span style="font-size:12px;color:#8B95A1;font-weight:600">예약됨</span>`;
          else if(full) btn=`<span style="font-size:12px;color:#B0B8C1;font-weight:600">마감</span>`;
          else if(!pass) btn=`<span style="font-size:12px;color:#B0B8C1;font-weight:600">이용권 없음</span>`;
          else btn=hasRemain
            ? `<button data-book="${selDate}" data-time="${t}" class="btn-sm btn-sm-blue">예약</button>`
            : `<span style="font-size:12px;color:#B0B8C1;font-weight:600">횟수 부족</span>`;

          return `<div class="slot-card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
            <div style="flex:1">
              <p style="font-size:17px;font-weight:800">${TIME_LABELS[t]}</p>
              <p style="font-size:12px;color:#8B95A1;margin-top:3px">${cnt}/${cap}명${isBooked?" · ✅ 예약됨":""}</p>
            </div>
            ${btn}
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

function renderMemberProfile(m) {
  const done = Object.keys(m.records).length;
  const pct  = Math.round(done/WODS.length*100);
  let lastGroup = null;

  const wodRows = WODS.map(wod => {
    let groupHeader = "";
    const g = wod.group||"WOD";
    if (g!==lastGroup) {
      groupHeader = `<div class="wod-group-header">${GROUP_LABELS[g]||g}</div>`;
      lastGroup = g;
    }
    const rec = m.records[wod.id];
    const isEd = S.editingWod?.memberId===m.id && S.editingWod?.wodId===wod.id;
    return groupHeader + renderWodRow(wod, rec, isEd, m.id);
  }).join("");

  return `<div class="screen">
    <div class="nav">
      <div style="display:flex;align-items:center;gap:10px;flex:1">
        <button id="btn-pick-avatar" style="background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:8px">
          ${renderAvatar(m,32)}
          <span style="font-size:16px;font-weight:800;color:#1A1A2E">${m.name}</span>
        </button>
      </div>
      <button id="btn-show-rank" style="background:#EBF3FE;border:none;border-radius:99px;padding:6px 12px;font-size:12px;font-weight:700;color:#3182F6;cursor:pointer">🏆 순위</button>
    </div>
    <div style="padding:10px 20px;background:#fff;border-bottom:1px solid #E8EBED;display:flex;align-items:center;gap:12px;flex-shrink:0">
      <div class="progress-track" style="flex:1">
        <div class="progress-fill" style="width:${pct}%;background:#3182F6"></div>
      </div>
      <span style="font-size:12px;font-weight:700;color:#8B95A1">${done}/${WODS.length} · ${pct}%</span>
    </div>
    <div class="scroll">
      ${wodRows}
      <div style="height:24px"></div>
    </div>
    ${S.avatarPickerOpen ? renderAvatarPickerModal(m) : ""}
  </div>`;
}

function renderWodRow(wod, rec, isEd, memberId) {
  const wtype = wod.type||"time";
  let body = "";

  if (isEd) {
    let inputHtml = "";
    if (wtype==="time") {
      inputHtml = `<div class="time-row">
        <div class="time-field-wrap">
          <input class="time-field" id="inp-min" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" value="${S.timeVal.min}"/>
          <span class="time-label">분</span>
        </div>
        <span class="time-sep">:</span>
        <div class="time-field-wrap">
          <input class="time-field" id="inp-sec" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="00" value="${S.timeVal.sec}"/>
          <span class="time-label">초</span>
        </div>
      </div>`;
    } else {
      const unitLabel = wtype==="weight"?"kg":wtype==="rounds"?"R":"회";
      const inputId   = wtype==="weight"?"inp-weight":wtype==="rounds"?"inp-rounds":"inp-reps";
      const imode     = wtype==="weight"?"decimal":"numeric";
      inputHtml = `<div class="time-row">
        <div class="time-field-wrap" style="flex:2">
          <input class="time-field" id="${inputId}" type="text" inputmode="${imode}" pattern="[0-9.]*" placeholder="0" value="${S.editVal.value}"/>
          <span class="time-label">${unitLabel}</span>
        </div>
      </div>`;
    }
    body = `<div class="edit-area">
      ${inputHtml}
      <input class="input" id="inp-scale" placeholder="스케일 (RX, Scaled 등) 선택사항" value="${S.editVal.scale}" style="height:40px;font-size:13px;margin-top:4px"/>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn-secondary" id="btn-edit-cancel" style="flex:1;height:38px;font-size:14px">취소</button>
        <button style="flex:2;height:38px;background:#3182F6;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff" data-save="${memberId}" data-wid="${wod.id}" data-wtype="${wtype}">저장</button>
      </div>
    </div>`;
  } else if (rec) {
    body = `<span class="rec-val">${rec.value}</span>
    <div class="rec-meta">
      ${rec.scale?`<span class="chip chip-blue">${rec.scale}</span>`:""}
      <span class="rec-date">${rec.date}</span>
      <button class="icon-btn" data-open-edit="${memberId}" data-ewid="${wod.id}" style="margin-left:auto;background:#F2F4F6;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;color:#8B95A1;display:flex;align-items:center;gap:4px">${ico.edit} 수정</button>
    </div>`;
  } else {
    body = `<button class="add-rec-btn" data-open-edit="${memberId}" data-ewid="${wod.id}">+ 기록 추가</button>`;
  }

  return `<div class="wod-row${rec?" done":""}">
    <div class="wod-num${rec?" done":""}">${wod.id}</div>
    <div class="wod-content">
      <p class="wod-name">${wod.name}</p>
      ${wod.detail?`<p class="wod-detail">${wod.detail}</p>`:""}
      ${wod.youtube ? renderYoutubeCard(wod.youtube) : '<p style="font-size:12px;color:#B0B8C1;margin-top:8px;line-height:1.6">아직 설명 영상이 업로드되지 않았습니다. 코치에게 문의해주시면 친절하게 설명해드리겠습니다! 😊</p>'}
      ${body}
    </div>
  </div>`;
}

function renderCoachClass() {
  const days = getWorkdays(14);
  const selDate = S.coachClassDate || days[0].toISOString().slice(0,10);
  const dayClasses = classes[selDate]||{};

  return `<div class="screen">
    <div class="nav">
      <button class="nav-back" id="btn-section-back">${ico.back}</button>
      <div class="nav-title">수업 관리</div>
    </div>
    <div class="scroll" style="background:#F2F4F6">
      <div class="date-scroll">
        ${days.map(day=>{
          const iso=day.toISOString().slice(0,10);
          const active=iso===selDate;
          return `<button class="date-btn" data-coach-date="${iso}"
            style="background:${active?"#3182F6":"#F2F4F6"};border:2px solid ${active?"#3182F6":"transparent"}">
            <span class="dow" style="color:${active?"rgba(255,255,255,.8)":"#8B95A1"}">${DAY_KO[day.getDay()]}</span>
            <span class="dd"  style="color:${active?"#fff":"#1A1A2E"}">${day.getDate()}</span>
          </button>`;
        }).join("")}
      </div>
      <div style="padding:0 20px 40px">
        ${CLASS_TIMES.map(t=>{
          const slot=dayClasses[t]||{};
          const bookings=slot.bookings||{};
          const cap=slot.capacity||10;
          const cnt=Object.keys(bookings).length;
          const bookedNames=Object.keys(bookings).map(id=>members.find(m=>m.id===id)?.name||id);
          return `<div class="card" style="margin-bottom:10px">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <div>
                <p style="font-size:18px;font-weight:800">${TIME_LABELS[t]}</p>
                <p style="font-size:12px;color:#8B95A1;margin-top:2px">${cnt}/${cap}명 예약</p>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <button data-cap-m="${selDate}" data-cap-t="${t}" data-cap-c="${cap}"
                  style="width:30px;height:30px;border-radius:8px;border:1.5px solid #E8EBED;background:#F2F4F6;font-size:18px;cursor:pointer;color:#8B95A1;display:flex;align-items:center;justify-content:center">−</button>
                <span style="font-size:14px;font-weight:700;min-width:20px;text-align:center">${cap}</span>
                <button data-cap-p="${selDate}" data-cap-t="${t}" data-cap-c="${cap}"
                  style="width:30px;height:30px;border-radius:8px;border:1.5px solid #E8EBED;background:#F2F4F6;font-size:18px;cursor:pointer;color:#8B95A1;display:flex;align-items:center;justify-content:center">+</button>
              </div>
            </div>
            <div class="progress-track" style="margin-bottom:10px">
              <div class="progress-fill" style="width:${Math.min(100,cnt/cap*100)}%;background:${cnt>=cap?"#F04452":"#3182F6"}"></div>
            </div>
            ${bookedNames.length===0
              ? `<p style="font-size:13px;color:#B0B8C1">예약자 없음</p>`
              : `<div style="display:flex;flex-wrap:wrap;gap:6px">${bookedNames.map(n=>`<span class="chip chip-blue">${n}</span>`).join("")}</div>`}
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

function renderCoachMembers() {
  const addBox = S.addingMember ? `<div style="background:#F2F4F6;border-radius:14px;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px">
    <input id="inp-new-name" class="input" placeholder="이름 입력" value="${S.newMemberName||""}"/>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" id="btn-add-cancel" style="flex:1;height:40px;font-size:14px">취소</button>
      <button id="btn-add-save" style="flex:2;height:40px;background:#3182F6;border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff">추가</button>
    </div>
  </div>` : "";

  const passModal = S.editingPassId ? renderCoachPassModal() : "";
  const pinModal  = S.editingMemberId ? renderCoachPinModal() : "";
  const delModal  = S.confirmDeleteId ? renderCoachDelModal() : "";

  return `<div class="screen">
    <div class="nav">
      <button class="nav-back" id="btn-section-back">${ico.back}</button>
      <div class="nav-title">회원 관리</div>
      <button id="btn-add-member" class="nav-action">${ico.plus} 추가</button>
    </div>
    <div class="scroll" style="background:#F2F4F6;padding:14px 20px 40px">
      ${addBox}
      ${members.map(m=>{
        const pass=passes[m.id];
        const passText=!pass?"이용권 없음":pass.type==="unlimited"?`무제한 · ${pass.expiry||"-"}`:`잔여 ${(pass.total||0)-(pass.used||0)}회`;
        return `<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          ${renderAvatar(m,40)}
          <div style="flex:1;min-width:0">
            <p style="font-size:14px;font-weight:700">${m.name}</p>
            <p style="font-size:12px;color:#8B95A1;margin-top:2px">${passText}</p>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button data-edit-pass="${m.id}" class="btn-sm btn-sm-gray">이용권</button>
            <button data-edit-pin="${m.id}" class="btn-sm btn-sm-gray">PIN</button>
            <button data-del-member="${m.id}" class="icon-btn" style="color:#F04452">${ico.trash}</button>
          </div>
        </div>`;
      }).join("")}
    </div>
    ${passModal}${pinModal}${delModal}
  </div>`;
}

function renderCoachPassModal() {
  const m=members.find(x=>x.id===S.editingPassId);
  if(!m)return "";
  const pass=passes[m.id]||{};
  const type=(S.passForm?.type)||pass.type||"count";
  return `<div class="modal-overlay" id="pass-modal-overlay">
    <div class="modal-box">
      <p class="modal-title">${m.name} 이용권</p>
      <div style="display:flex;gap:8px">
        ${["count","unlimited"].map(t=>`<button data-pass-type="${t}" style="flex:1;height:36px;border-radius:10px;border:2px solid ${type===t?"#3182F6":"#E8EBED"};background:${type===t?"#EBF3FE":"#F2F4F6"};color:${type===t?"#3182F6":"#8B95A1"};font-size:13px;font-weight:700;cursor:pointer">${t==="count"?"🎟️ 횟수권":"♾️ 무제한"}</button>`).join("")}
      </div>
      ${type==="count"?`<div style="display:flex;gap:8px">
        <div class="input-group" style="flex:1"><div class="input-label">총 횟수</div><input id="inp-pass-total" class="input" type="text" inputmode="numeric" style="height:44px" value="${S.passForm?.total??pass.total??""}"/></div>
        <div class="input-group" style="flex:1"><div class="input-label">사용</div><input id="inp-pass-used" class="input" type="text" inputmode="numeric" style="height:44px" value="${S.passForm?.used??pass.used??""}"/></div>
      </div>`:""}
      <div class="input-group"><div class="input-label">만료일</div><input id="inp-pass-expiry" class="input" type="date" style="height:44px" value="${S.passForm?.expiry??pass.expiry??""}"/></div>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" id="btn-pass-cancel" style="flex:1;height:46px;font-size:14px">취소</button>
        <button id="btn-pass-save" style="flex:2;height:46px;background:#3182F6;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff">저장</button>
      </div>
    </div>
  </div>`;
}

function renderCoachPinModal() {
  const m=members.find(x=>x.id===S.editingMemberId);
  if(!m)return "";
  return `<div class="modal-overlay" id="pin-modal-overlay">
    <div class="modal-box">
      <p class="modal-title">${m.name} PIN 설정</p>
      <div class="input-group">
        <div class="input-label">새 PIN (4자리 숫자)</div>
        <input id="inp-new-pin" class="input" type="text" inputmode="numeric" maxlength="4" placeholder="0000" value="${S.newPinVal||m.pin||""}"/>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-secondary" id="btn-pin-modal-cancel" style="flex:1;height:46px;font-size:14px">취소</button>
        <button id="btn-pin-modal-save" style="flex:2;height:46px;background:#3182F6;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff">저장</button>
      </div>
    </div>
  </div>`;
}

function renderCoachDelModal() {
  const m=members.find(x=>x.id===S.confirmDeleteId);
  return `<div class="modal-center" id="del-modal-overlay">
    <div class="modal-center-box">
      <p class="modal-title">회원 삭제</p>

function renderCoachBench() {
  const tabs=[{k:"sheet",l:"시트"},{k:"rank",l:"순위"},{k:"wod",l:"WOD"},{k:"msg",l:"한마디"}];
  const pm=members.find(m=>m.id===S.coachPanelId);

  let content="";
  if(S.coachBenchTab==="sheet") {
    const sheet=pm ? (() => {
      const done=Object.keys(pm.records).length;
      const pct=Math.round(done/WODS.length*100);
      let lastGroup=null;
      const rows=WODS.map(wod=>{
        let gh="";
        const g=wod.group||"WOD";
        if(g!==lastGroup){gh=`<div class="wod-group-header">${GROUP_LABELS[g]||g}</div>`;lastGroup=g;}
        const rec=pm.records[wod.id];
        const isEd=S.editingWod?.memberId===pm.id&&S.editingWod?.wodId===wod.id;
        return gh+renderWodRow(wod,rec,isEd,pm.id);
      }).join("");
      return `<div style="padding:10px 16px;background:#fff;border-bottom:1px solid #E8EBED;display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div class="progress-track" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:#3182F6"></div></div>
        <span style="font-size:12px;font-weight:700;color:#8B95A1">${done}/${WODS.length} · ${pct}%</span>
      </div>${rows}`;
    })() : `<div style="display:flex;align-items:center;justify-content:center;height:200px;color:#B0B8C1;font-size:14px">← 회원을 선택하세요</div>`;

    content=`<div class="coach-layout">
      <div class="sidebar">
        ${members.map(m=>{
          const act=m.id===S.coachPanelId;
          return `<div class="sidebar-row${act?" active":""}" data-panel="${m.id}" style="cursor:pointer">
            ${renderAvatar(m,28)}
            <span class="sidebar-name${act?" active":""}">${m.name}</span>
          </div>`;
        }).join("")}
      </div>
      <div class="sheet-panel scroll">
        ${sheet}
        <div style="height:24px"></div>
      </div>
    </div>`;
  } else if(S.coachBenchTab==="rank") {
    const medals=["🥇","🥈","🥉"];
    content=`<div class="scroll" style="padding:14px 20px 40px;background:#F2F4F6">
      ${WODS.map(wod=>{
        const board=lb(wod.id);
        return `<div class="rank-card" style="margin-bottom:10px">
          <div class="rank-card-head">
            <span style="font-size:10px;font-weight:700;color:#8B95A1">WOD ${wod.id}</span>
            <span style="font-size:14px;font-weight:700">${wod.name}</span>
          </div>
          ${board.length===0?`<p style="font-size:13px;color:#B0B8C1">기록 없음</p>`
            :board.slice(0,3).map((r,i)=>`<div class="rank-row">
              <span class="rank-medal">${i<3?medals[i]:i+1}</span>
              <span class="rank-name">${r.name}</span>
              <span class="rank-val">${r.value}</span>
              ${r.scale?`<span class="chip chip-blue">${r.scale}</span>`:""}
            </div>`).join("")}
        </div>`;
      }).join("")}
    </div>`;
  } else if(S.coachBenchTab==="wod") {
    content=renderCoachWodManager();
  } else {
    content=`<div class="scroll" style="padding:20px;background:#F2F4F6">
      <div class="card">
        <p class="input-label" style="margin-bottom:10px">코치의 한마디</p>
        <textarea id="inp-msg" maxlength="100"
          style="width:100%;height:100px;background:#F2F4F6;border:1.5px solid #3182F6;border-radius:12px;padding:12px;font-size:14px;line-height:1.6;resize:none;outline:none;font-family:inherit"
          placeholder="회원들에게 전할 메시지">${coachMessage}</textarea>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button id="btn-msg-clear" class="btn-secondary" style="flex:1;height:44px;font-size:14px">지우기</button>
          <button id="btn-msg-save" style="flex:2;height:44px;background:#3182F6;border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff">저장</button>
        </div>
      </div>
    </div>`;
  }

  const editWodOverlay = S.editingWodMgr ? renderWodEditOverlay() : "";

  return `<div class="screen">
    <div class="nav">
      <button class="nav-back" id="btn-section-back">${ico.back}</button>
      <div class="nav-title">벤치마크</div>
      <div style="display:flex;gap:2px;background:#F2F4F6;border-radius:10px;padding:3px">
        ${tabs.map(t=>`<button data-bench-tab="${t.k}" style="border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;background:${S.coachBenchTab===t.k?"#fff":"none"};color:${S.coachBenchTab===t.k?"#1A1A2E":"#8B95A1"};box-shadow:${S.coachBenchTab===t.k?"0 1px 4px rgba(0,0,0,.08)":"none"}">${t.l}</button>`).join("")}
      </div>
    </div>
    ${content}
    ${editWodOverlay}
  </div>`;
}

function renderCoachWodManager() {
  const GL={STRENGTH:"💪 STRENGTH",CARDIO:"🏃 CARDIO",WOD:"🔥 WOD"};
  let lastGroup=null;
  const rows=WODS.map(function(wod){
    let gh="";
    const g=wod.group||"WOD";
    if(g!==lastGroup){gh='<p style="font-size:11px;font-weight:800;color:#8B95A1;letter-spacing:.6px;padding:12px 4px 4px">'+(GL[g]||g)+'</p>';lastGroup=g;}
    return gh+'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #F2F4F6">'
      +'<div style="width:24px;height:24px;border-radius:7px;background:#EBF3FE;color:#3182F6;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+wod.id+'</div>'
      +'<div style="flex:1;min-width:0"><p style="font-size:14px;font-weight:700">'+wod.name+'</p>'+(wod.detail?'<p style="font-size:12px;color:#8B95A1;margin-top:1px">'+wod.detail+'</p>':'')+'</div>'
      +'<div style="display:flex;gap:4px;flex-shrink:0">'
      +'<button class="icon-btn" data-wod-edit="'+wod.id+'" style="color:#8B95A1">'+ico.edit+'</button>'
      +(WODS.length>1?'<button class="icon-btn" data-wod-del="'+wod.id+'">'+ico.trash+'</button>':'')
      +'</div></div>';
  }).join("");

  const addForm = S.showWodForm ? renderWodAddForm() : "";

  return `<div class="scroll" style="background:#F2F4F6;padding:14px 20px 40px">
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <p style="font-size:13px;font-weight:700;color:#8B95A1">WOD 목록 (${WODS.length}개)</p>

          ${ico.plus} WOD 추가
        </button>
      </div>
      ${addForm}
      ${rows}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════════
   BIND
══════════════════════════════════════════════════ */
function bind() {
  const g=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=g(id);if(el)el.addEventListener(ev,fn);};
  const qa=(sel,fn)=>document.querySelectorAll(sel).forEach(fn);

  /* ── LOGIN ── */
  // search
  const searchEl=g("inp-search");
  if(searchEl){
    let composing=false;
    searchEl.addEventListener("compositionstart",()=>{composing=true;});
    searchEl.addEventListener("compositionend",e=>{composing=false;S.loginSearch=e.target.value;render();});
    searchEl.addEventListener("input",e=>{if(composing)return;S.loginSearch=e.target.value;render();});
  }
  // select member
  qa("[data-select]",el=>el.addEventListener("click",()=>{
    const m=members.find(x=>x.id===el.dataset.select);
    if(!m)return;
    // auto-login if no PIN set and has session
    if(!m.pin){
      const saved=loadSession();
      if(saved===m.id){doMemberLogin(m.id);return;}
    }
    S.loginTarget={id:m.id,name:m.name,avatar:m.avatar};
    S.loginPin="";S.loginPinErr=false;S.loginStep="pin";render();
  }));
  // coach login
  on("btn-coach-login","click",()=>{S.loginTarget={id:"coach",name:"코치",avatar:null};S.loginPin="";S.loginPinErr=false;S.loginStep="pin";render();});
  // register
  on("btn-register","click",()=>{S.loginStep="register";S.regName="";S.regAvatar=null;render();setTimeout(()=>g("inp-reg-name")?.focus(),60);});
  on("btn-reg-back","click",()=>{S.loginStep="list";render();});
  on("inp-reg-name","input",e=>{S.regName=e.target.value;});
  on("inp-reg-name","keydown",e=>{if(e.key==="Enter")doRegNext();});
  on("btn-reg-next","click",doRegNext);
  on("btn-reg-av-back","click",()=>{S.loginStep="register";render();});
  qa("[data-reg-av]",el=>el.addEventListener("click",()=>{S.regAvatar=parseInt(el.dataset.regAv);render();}));
  on("btn-reg-save","click",doRegisterMember);
  // PIN keypad
  on("btn-pin-back","click",()=>{S.loginStep="list";S.loginPin="";render();});
  qa("[data-pin-key]",el=>el.addEventListener("click",()=>{
    const k=el.dataset.pinKey;
    if(k==="del"){S.loginPin=S.loginPin.slice(0,-1);}
    else if(S.loginPin.length<4){S.loginPin+=k;}
    if(S.loginPin.length===4) setTimeout(doCheckPin,80);
    else render();
  }));
  on("btn-skip-pin","click",()=>{if(S.loginTarget)doMemberLogin(S.loginTarget.id);});

  /* ── MEMBER ── */
  qa("[data-tab]",el=>el.addEventListener("click",()=>{S.memberTab=el.dataset.tab;render();}));
  on("btn-logout","click",()=>{clearSession();S.view="login";S.loginStep="list";S.activeMemberId=null;render();});
  on("btn-show-rank","click",()=>{S.showRank=true;render();});
  on("btn-close-rank","click",()=>{S.showRank=false;render();});
  on("rank-modal-overlay","click",()=>{S.showRank=false;render();});
  // date select
  qa("[data-date]",el=>el.addEventListener("click",()=>{S.bookDate=el.dataset.date;render();}));
  // booking
  qa("[data-book]",el=>el.addEventListener("click",()=>doBook(el.dataset.book,el.dataset.time)));
  qa("[data-cancel]",el=>el.addEventListener("click",()=>doCancel(el.dataset.cancel,el.dataset.time)));
  // avatar picker
  on("btn-pick-avatar","click",()=>{S.avatarPickerOpen=true;render();});
  on("btn-av-cancel","click",()=>{S.avatarPickerOpen=false;render();});
  on("av-modal-overlay","click",()=>{S.avatarPickerOpen=false;render();});
  on("btn-av-reset","click",()=>{fbUpdate(`members/${S.activeMemberId}`,{avatar:null});S.avatarPickerOpen=false;});
  qa("[data-pick-av]",el=>el.addEventListener("click",e=>{
    e.stopPropagation();
    fbUpdate(`members/${S.activeMemberId}`,{avatar:parseInt(el.dataset.pickAv)});
    S.avatarPickerOpen=false;showToast("캐릭터 저장 완료!");
  }));
  // wod record
  qa("[data-open-edit]",el=>el.addEventListener("click",()=>{
    const mid=el.dataset.openEdit,wid=parseInt(el.dataset.ewid);
    const m=members.find(x=>x.id===mid); const r=m?.records[wid]||{};
    const wod=WODS.find(w=>w.id===wid); const wtype=wod?.type||"time";
    S.editingWod={memberId:mid,wodId:wid};
    S.editVal={scale:r.scale||"",value:r.value||""};
    if(wtype==="time"){
      const match=r.value?.match(/(\d+)'(\d+)/);
      S.timeVal=match?{min:match[1],sec:match[2]}:{min:"",sec:""};
    } else {
      S.timeVal={min:"",sec:""};
      S.editVal.value=r.value?parseFloat(r.value)||"":"";
    }
    render(); setTimeout(()=>(g("inp-min")||g("inp-weight")||g("inp-rounds")||g("inp-reps"))?.focus(),50);
  }));
  on("btn-edit-cancel","click",()=>{S.editingWod=null;render();});
  on("inp-min","input",e=>{S.timeVal.min=e.target.value;});
  on("inp-sec","input",e=>{S.timeVal.sec=e.target.value;});
  on("inp-weight","input",e=>{S.editVal.value=e.target.value;});
  on("inp-rounds","input",e=>{S.editVal.value=e.target.value;});
  on("inp-reps","input",e=>{S.editVal.value=e.target.value;});
  on("inp-scale","input",e=>{S.editVal.scale=e.target.value;});
  qa("[data-save]",el=>el.addEventListener("click",()=>doSaveRecord(el.dataset.save,parseInt(el.dataset.wid),el.dataset.wtype)));

  /* ── COACH ── */
  on("btn-coach-logout","click",()=>{S.view="login";S.loginStep="list";S.coachSection="menu";render();});
  qa("[data-section]",el=>el.addEventListener("click",()=>{S.coachSection=el.dataset.section;render();}));
  on("btn-section-back","click",()=>{S.coachSection="menu";S.coachPanelId=null;S.editingWod=null;render();});
  qa("[data-bench-tab]",el=>el.addEventListener("click",()=>{S.coachBenchTab=el.dataset.benchTab;render();}));
  qa("[data-panel]",el=>el.addEventListener("click",()=>{S.coachPanelId=el.dataset.panel;S.editingWod=null;render();}));
  on("btn-add-member","click",()=>{S.addingMember=true;S.newMemberName="";render();setTimeout(()=>g("inp-new-name")?.focus(),60);});
  on("btn-add-cancel","click",()=>{S.addingMember=false;render();});
  on("inp-new-name","input",e=>{S.newMemberName=e.target.value;});
  on("inp-new-name","keydown",e=>{if(e.key==="Enter")doAddMember();});
  on("btn-add-save","click",doAddMember);
  qa("[data-edit-pass]",el=>el.addEventListener("click",()=>{
    S.editingPassId=el.dataset.editPass;
    S.passForm={...(passes[el.dataset.editPass]||{type:"count"})};render();
  }));
  qa("[data-pass-type]",el=>el.addEventListener("click",e=>{e.stopPropagation();if(S.passForm){S.passForm.type=el.dataset.passType;render();}}));
  on("btn-pass-cancel","click",()=>{S.editingPassId=null;S.passForm=null;render();});
  on("pass-modal-overlay","click",()=>{S.editingPassId=null;S.passForm=null;render();});
  on("btn-pass-save","click",doSavePass);
  qa("[data-edit-pin]",el=>el.addEventListener("click",()=>{S.editingMemberId=el.dataset.editPin;S.newPinVal="";render();setTimeout(()=>g("inp-new-pin")?.focus(),60);}));
  on("inp-new-pin","input",e=>{S.newPinVal=e.target.value;});
  on("btn-pin-modal-cancel","click",()=>{S.editingMemberId=null;render();});
  on("pin-modal-overlay","click",()=>{S.editingMemberId=null;render();});
  on("btn-pin-modal-save","click",doSavePin);
  qa("[data-del-member]",el=>el.addEventListener("click",()=>{S.confirmDeleteId=el.dataset.delMember;render();}));
  on("btn-del-cancel","click",()=>{S.confirmDeleteId=null;render();});
  on("del-modal-overlay","click",()=>{S.confirmDeleteId=null;render();});
  on("btn-del-ok","click",()=>doDeleteMember(S.confirmDeleteId));
  on("btn-coach-date","click",()=>{}); // placeholder
  qa("[data-coach-date]",el=>el.addEventListener("click",()=>{S.coachClassDate=el.dataset.coachDate;render();}));
  qa("[data-cap-m]",el=>el.addEventListener("click",()=>{const c=parseInt(el.dataset.capC)||10;if(c>1)fbSet(`classes/${el.dataset.capM}/${el.dataset.capT}/capacity`,c-1);}));
  qa("[data-cap-p]",el=>el.addEventListener("click",()=>{const c=parseInt(el.dataset.capC)||10;fbSet(`classes/${el.dataset.capP}/${el.dataset.capT}/capacity`,c+1);}));
  // WOD manager
  on("btn-wod-form-toggle","click",()=>{S.showWodForm=!S.showWodForm;S.wodFormVal={name:"",detail:"",group:"WOD",type:"time"};render();setTimeout(()=>g("inp-wod-name")?.focus(),50);});
  on("btn-wod-form-cancel","click",()=>{S.showWodForm=false;render();});
  qa("[data-form-group]",el=>el.addEventListener("click",()=>{S.wodFormVal={...S.wodFormVal,group:el.dataset.formGroup};render();}));
  qa("[data-form-type]",el=>el.addEventListener("click",()=>{S.wodFormVal={...S.wodFormVal,type:el.dataset.formType};render();}));
  on("inp-wod-name","input",e=>{S.wodFormVal.name=e.target.value;});
  on("inp-wod-detail","input",e=>{S.wodFormVal.detail=e.target.value;});
  on("inp-wod-youtube","input",e=>{S.wodFormVal.youtube=e.target.value;});
  on("btn-wod-form-save","click",doAddWod);
  qa("[data-wod-edit]",el=>el.addEventListener("click",()=>{
    const wod=WODS.find(w=>w.id===parseInt(el.dataset.wodEdit));
    if(wod){S.editingWodMgr={...wod};render();setTimeout(()=>g("inp-ewod-name")?.focus(),60);}
  }));
  on("btn-ewod-cancel","click",()=>{S.editingWodMgr=null;render();});
  on("wod-edit-overlay","click",()=>{S.editingWodMgr=null;render();});
  qa("[data-ewod-group]",el=>el.addEventListener("click",e=>{e.stopPropagation();if(S.editingWodMgr){S.editingWodMgr={...S.editingWodMgr,group:el.dataset.ewodGroup};render();}}));
  qa("[data-ewod-type]",el=>el.addEventListener("click",e=>{e.stopPropagation();if(S.editingWodMgr){S.editingWodMgr={...S.editingWodMgr,type:el.dataset.ewodType};render();}}));
  on("inp-ewod-name","input",e=>{if(S.editingWodMgr)S.editingWodMgr.name=e.target.value;});
  on("inp-ewod-detail","input",e=>{if(S.editingWodMgr)S.editingWodMgr.detail=e.target.value;});
  on("inp-ewod-youtube","input",e=>{if(S.editingWodMgr)S.editingWodMgr.youtube=e.target.value;});
  on("btn-ewod-save","click",doEditWod);
  qa("[data-wod-del]",el=>el.addEventListener("click",()=>doDeleteWod(parseInt(el.dataset.wodDel))));
  // coach msg
  on("btn-msg-save","click",()=>{const v=g("inp-msg")?.value.trim()||"";fbSet("coachMessage",v);showToast("저장 완료!");});
  on("btn-msg-clear","click",()=>{const el=g("inp-msg");if(el)el.value="";fbSet("coachMessage","");showToast("지웠어요");});
}

/* ══════════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════════ */
function doRegNext() {
  const name=(document.getElementById("inp-reg-name")?.value||S.regName).trim();
  if(!name)return;
  const dup=members.find(m=>m.name===name);
  if(dup){S.loginTarget={id:dup.id,name:dup.name,avatar:dup.avatar};S.loginPin="";S.loginPinErr=false;S.loginStep="pin";render();return;}
  S.regName=name;S.loginStep="reg-avatar";render();
}

function doRegisterMember() {
  const name=S.regName.trim(); if(!name)return;
  const data={name,records:{},avatar:S.regAvatar??null,pin:""};
  fbPush("members",data).then(ref=>{
    doMemberLogin(ref.key);showToast(`${name}님 환영해요! 🎉`);
  });
}

function doCheckPin() {
  const target=S.loginTarget;
  if(!target)return;
  if(target.id==="coach"){
    if(S.loginPin===COACH_PIN){S.view="coach";S.coachSection="menu";S.loginStep="list";S.loginPin="";render();}
    else{S.loginPinErr=true;S.loginPin="";render();}
    return;
  }
  const m=members.find(x=>x.id===target.id);
  if(!m)return;
  if(!m.pin||S.loginPin===m.pin){doMemberLogin(m.id);}
  else{S.loginPinErr=true;S.loginPin="";render();}
}

function doMemberLogin(id) {
  S.activeMemberId=id;S.view="member";S.memberTab="home";
  S.loginStep="list";S.loginPin="";S.loginSearch="";S.bookDate=null;
  saveSession(id);render();
}

function doBook(date,time) {
  const mid=S.activeMemberId;
  const pass=passes[mid];
  if(!pass){showToast("이용권이 없어요");return;}
  const slot=(classes[date]||{})[time]||{};
  const bookings=slot.bookings||{};
  const cap=slot.capacity||10;
  if(Object.keys(bookings).length>=cap){showToast("정원이 마감됐어요");return;}
  if(pass.type==="count"&&(pass.total||0)-(pass.used||0)<=0){showToast("잔여 횟수가 없어요");return;}
  fbSet(`classes/${date}/${time}/bookings/${mid}`,true);
  if(pass.type==="count")fbSet(`passes/${mid}/used`,(pass.used||0)+1);
  showToast("예약 완료! ✅");
}

function doCancel(date,time) {
  const mid=S.activeMemberId;
  const [hh,mm]=time.split("-").map(Number);
  const [sy,smo,sd]=date.split("-").map(Number);
  const classDT=new Date(sy,smo-1,sd,hh,mm,0,0);
  if(new Date()>=new Date(classDT.getTime()-3600000)){showToast("취소 가능 시간이 지났어요");return;}
  fbRemove(`classes/${date}/${time}/bookings/${mid}`);
  const pass=passes[mid];
  if(pass&&pass.type==="count")fbSet(`passes/${mid}/used`,Math.max(0,(pass.used||0)-1));
  showToast("예약이 취소됐어요");
}

function doSaveRecord(mid,wid,wtype) {
  const scaleEl=document.getElementById("inp-scale");
  const scale=scaleEl?scaleEl.value.trim():S.editVal.scale.trim();
  const wod=WODS.find(w=>w.id===wid);
  const t=wtype||wod?.type||"time";
  let value="";
  if(t==="time"){
    const min=parseInt(document.getElementById("inp-min")?.value||S.timeVal.min)||0;
    const sec=parseInt(document.getElementById("inp-sec")?.value||S.timeVal.sec)||0;
    if(min===0&&sec===0)return;
    value=`${min}'${String(sec).padStart(2,"0")}"`;
  }else if(t==="weight"){
    const w=document.getElementById("inp-weight")?.value||S.editVal.value;
    if(!w||parseFloat(w)===0)return;
    value=`${parseFloat(w)}kg`;
  }else if(t==="rounds"){
    const r=document.getElementById("inp-rounds")?.value||S.editVal.value;
    if(!r)return; value=`${r}R`;
  }else{
    const r=document.getElementById("inp-reps")?.value||S.editVal.value;
    if(!r)return; value=`${r}회`;
  }
  S.editingWod=null;S.timeVal={min:"",sec:""};S.editVal={value:"",scale:""};render();
  fbSet(`members/${mid}/records/${wid}`,{value,scale,date:today()});
  showToast(`${wod?.name||"WOD"} 기록 저장!`);
}

function doAddMember() {
  const name=(document.getElementById("inp-new-name")?.value||S.newMemberName||"").trim();
  if(!name)return;
  fbPush("members",{name,records:{},avatar:null,pin:""});
  S.addingMember=false;S.newMemberName="";
}

function doSavePass() {
  const mid=S.editingPassId; if(!mid||!S.passForm)return;
  const type=S.passForm.type||"count";
  const expiry=document.getElementById("inp-pass-expiry")?.value||S.passForm.expiry||"";
  let data={type,expiry};
  if(type==="count"){
    data.total=parseInt(document.getElementById("inp-pass-total")?.value||S.passForm.total)||0;
    data.used=parseInt(document.getElementById("inp-pass-used")?.value||S.passForm.used)||0;
  }
  fbSet(`passes/${mid}`,data);S.editingPassId=null;S.passForm=null;showToast("이용권 저장!");
}

function doSavePin() {
  const mid=S.editingMemberId; if(!mid)return;
  const pin=(document.getElementById("inp-new-pin")?.value||S.newPinVal||"").trim();
  fbUpdate(`members/${mid}`,{pin});S.editingMemberId=null;showToast("PIN 저장!");
}

function doDeleteMember(id) {
  fbRemove(`members/${id}`);
  fbRemove(`passes/${id}`);
  S.confirmDeleteId=null;S.coachPanelId=null;
}

function doAddWod() {
  const name=(document.getElementById("inp-wod-name")?.value||S.wodFormVal.name).trim();
  const detail=(document.getElementById("inp-wod-detail")?.value||S.wodFormVal.detail).trim();
  if(!name)return;
  const maxId=WODS.length>0?Math.max(...WODS.map(w=>w.id)):0;
  const youtube=(document.getElementById("inp-wod-youtube")?.value||S.wodFormVal.youtube||"").trim();
  fbSet(`wods/${maxId+1}`,{name,detail,group:S.wodFormVal.group||"WOD",type:S.wodFormVal.type||"time",youtube});
  S.showWodForm=false;S.wodFormVal={name:"",detail:"",group:"WOD",type:"time",youtube:""};showToast("WOD 추가!");
}

function doEditWod() {
  const w=S.editingWodMgr; if(!w)return;
  const name=(document.getElementById("inp-ewod-name")?.value||w.name).trim();
  const detail=(document.getElementById("inp-ewod-detail")?.value||w.detail||"").trim();
  const youtube=(document.getElementById("inp-ewod-youtube")?.value||w.youtube||"").trim();
  fbSet(`wods/${w.id}`,{name,detail,group:w.group||"WOD",type:w.type||"time",youtube});
  S.editingWodMgr=null;showToast("WOD 수정!");
}

function doDeleteWod(id) {
  if(WODS.length<=1){showToast("최소 1개 필요해요");return;}
  fbRemove(`wods/${id}`);
  members.forEach(m=>{if(m.records[id])fbRemove(`members/${m.id}/records/${id}`);});
  showToast("WOD 삭제!");
}

/* Auto-login */
(function(){
  const saved=loadSession();
  if(saved){
    const m=members.find(x=>x.id===saved);
    if(m){doMemberLogin(saved);return;}
  }
  render();
})();
</script>
</body>
